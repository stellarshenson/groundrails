# ============================================================================
# document-processing grounding configuration
# ============================================================================
#
# Every tunable magic number used by the grounding pipeline lives here. The
# values below are the DEFAULTS that produced the best composite score on
# the reference BENCHMARK.md as of v1.3.27 (Liu 14-claim perfect, numeric
# seed perfect, cross-layer agreement gap >= 0.10, skill rules present).
#
# Override order (first match wins):
#   1. Explicit keyword argument to ground() / ground_batch() / etc
#   2. ./.stellars-plugins/config.yaml in the project root
#   3. This bundled default (shipped with the plugin)
#
# Tune via scripts/calibrate.py — it grid-searches the benchmark against
# per-field value lists and returns the highest-scoring combination.
#
# Sections map 1:1 to fields on GroundingConfig (see config.py).
# ============================================================================

# ---- match_type classification thresholds ----------------------------------
# These gate which match_type a claim resolves to. Priority: exact > fuzzy
# > bm25 > semantic > agreement-fallback > none. A layer must be ABOVE its
# threshold to "fire"; otherwise the next priority is tried.

# Partial-ratio Levenshtein score required for match_type=fuzzy.
# 0.85 means 85% of the claim must align to a substring in the source.
fuzzy_threshold: 0.85

# BM25 token_recall (fraction of unique claim tokens appearing in the
# winning passage) required for match_type=bm25. 0.5 = half the claim's
# unique tokens are present.
bm25_threshold: 0.5

# Raw cosine similarity required for match_type=semantic in ABSOLUTE mode
# (when percentile mode is disabled or the percentile is below this floor).
semantic_threshold: 0.6

# Fraction of the random chunk-pair cosine distribution that qualifies as
# "top-tier semantic" for match_type=semantic in PERCENTILE mode. 0.02 =
# top 2% of random pairs. Model-agnostic per H3.
semantic_threshold_percentile: 0.02

# Minimum agreement_score for the agreement-fallback classifier
# (match_type = highest-contributing layer). Too low = confirms weak
# hits; too high = rejects legitimate multi-layer-agreement paraphrases.
agreement_threshold: 0.45

# ---- match_type fallback floor ---------------------------------------------

# Safety floor for SemanticGrounder.percentile_threshold. Guards against
# degenerate corpora (1-2 chunks) where the sampled percentile collapses
# below a value any reasonable retrieval would call a real match. Set to
# 0 to disable.
percentile_floor: 0.65

# ---- agreement_score per-layer weights -------------------------------------
# Must sum to 1.0 unless you want to scale agreement_score beyond [0, 1].

agreement_weight_exact: 0.30
agreement_weight_fuzzy: 0.25
agreement_weight_bm25: 0.20
agreement_weight_semantic: 0.25

# ---- agreement_score per-layer ramps ---------------------------------------
# Each ramp converts a raw layer score in [0, 1] to a v_layer value in
# [0, 1]. Values below _low clamp to 0, values above _high clamp to 1,
# linear in between. Set the RAMP on the portion of the layer's output
# range that carries useful signal.

# Fuzzy: partial_ratio < 0.5 is essentially noise; > 1.0 can't happen.
fuzzy_ramp_low: 0.5
fuzzy_ramp_high: 1.0

# BM25 token_recall scales already in [0, 1]. Ramp over [0, 0.5] so a
# token_recall of 0.5 already contributes fully.
bm25_ramp_low: 0.0
bm25_ramp_high: 0.5

# Semantic absolute cosine: ramp over typical match range [0.5, 1.0].
semantic_abs_ramp_low: 0.5
semantic_abs_ramp_high: 1.0

# Semantic ratio (cosine / claim_self_score): ramp over [0.80, 1.00].
# Real hits tend to cluster near 1.0; values below 0.80 are topical noise.
semantic_ratio_ramp_low: 0.80
semantic_ratio_ramp_high: 1.00

# ---- agreement_score voter thresholds --------------------------------------
# A layer counts as a "voter" if its raw score meets its voter threshold.
# Multi-voter bonus rewards independent signals (H1: agreement beats
# magnitude).

voter_exact: 1.0                 # exact is binary
voter_fuzzy: 0.55                # partial-ratio of roughly half the claim
voter_bm25: 0.15                 # some token overlap
voter_semantic_abs: 0.70         # raw cosine above random-pair ~top-5%
voter_semantic_ratio: 0.90       # ratio close to self-similarity

# Semantic voter fires on EITHER the absolute OR the ratio threshold
# (OR-gate). Setting this to "and" requires both; "abs_only" drops
# ratio entirely.
voter_semantic_mode: or          # or | and | abs_only | ratio_only

# ---- agreement_score multi-voter bonuses -----------------------------------
# Added to the raw weighted sum. Reflects "N layers agreeing > any 1 alone".

voter_bonus_2: 0.20              # two independent voters
voter_bonus_3_plus: 0.35         # three or more (capped)

# ---- entity-presence penalty ------------------------------------------------
# Claim proper nouns absent from ANY source passage weaken confidence
# without forcing CONTRADICTED. Penalty = factor * (n_absent / n_entities),
# subtracted from agreement_score. Iter 3 added this to catch fabricated
# specific-entity claims like "RoPE-Mid" or "H100".

entity_penalty_factor: 0.15      # max penalty when 100% of claim entities are absent

# ---- lexical co-support gate (WI#5) ---------------------------------------
# Semantic-only hits (no lexical layer firing) often reflect topical noise,
# not real grounding. A hit carries lexical_co_support=True when semantic
# fires AND at least one lexical layer clears these low thresholds. When
# lexical_co_support is False on a CONFIRMED semantic hit, verification_needed
# gets flipped to True so downstream review knows to second-guess the verdict.

lexical_cosupport_fuzzy_min: 0.4   # partial-ratio below this = no meaningful word overlap
lexical_cosupport_bm25_min: 0.1    # <10% of claim's unique tokens present = effectively none

# ---- verification threshold proximity (WI#6) ------------------------------
# Claims confirmed by a layer whose score is this close to the layer's own
# threshold sit on the fence: below the value they would have been
# UNCONFIRMED. Flagged verification_needed for human/agent second-guess.

verification_threshold_proximity: 0.05

# ---- semantic layer -------------------------------------------------------

chunk_max_chars: 1500            # target recursive-chunk size
chunk_overlap_ratio: 0.25        # 25% overlap between adjacent chunks
percentile_sample_n: 200         # random chunk-pair cosines sampled at index time

# ---- sentence-split fallback -----------------------------------------------
# When blank-line splitting yields a single mega-passage (common with
# pdftotext output), fall back to sentence-level splits so BM25 has a
# non-degenerate corpus. Very short fragments are merged with their
# successor.

min_passage_chars: 40            # merge sentences shorter than this
single_passage_fallback_length: 1500  # trigger fallback above this text length

# ---- classifier mode (H11) -------------------------------------------------
# ``absolute`` = use agreement_threshold verbatim for match_type fallback.
# ``adaptive_gap`` = in batch mode (ground_batch), compute threshold as the
# midpoint of the largest gap in the semantic-zone agreement_score
# distribution. Model-agnostic within a corpus.

classifier_mode: adaptive_gap    # absolute | adaptive_gap

# Minimum number of semantic-zone claims required before adaptive_gap
# kicks in. Below this, adaptive falls back to absolute.
adaptive_gap_min_claims: 4

# ---- solution tier ---------------------------------------------------------
# The grounder offers three solution tiers; pick one. Each tier is an indivisible
# bundle - the algorithms it runs AND the manifold trained for exactly that
# bundle (calibration.lexical_manifolds.<tier> below). You select effort, not
# algorithms - the grounder chooses the combination internally.
#   low    - core grounder: word/char-ngram recall, fuzzy, anchors, specificity,
#            value-conflict (13 features)
#   medium - low + language id (is_en, same_lang) + WordNet antonym-flip (16)
#   high   - medium + MT translate-then-recall for the cross-lingual tail (18)
# Override per call via ground(..., config=cfg.overlay(lexical_effort=...)).
lexical_effort: high             # low | medium | high

# ---- other -----------------------------------------------------------------

context_chars: 80                # chars of before/after context captured per hit
semantic_top_k: 3                # top-K semantic alternatives reported

# ---- Bayesian calibrator ---------------------------------------------------
# Optional block read by document_processing/calibration.py. It is NOT part of
# the strict GroundingConfig schema (unknown keys are ignored there), so adding
# it never breaks config loading.
#
#   mode       - the grounder mode (public knob):
#                "lexical" (default) - the frozen-weight lexical-mode manifolds
#                   decide CONFIRMED at the tier named by `lexical_effort`.
#                "semantic" - reserved for the heavy entailment stage; runs
#                   lexical until that stage ships.
#                The deterministic cascade and the bambi calibrated head are
#                   internal verdict heads, not modes - reach them only via an
#                   explicit `engine:` override (back-compat) or the
#                   `calibrated_verdict=` API; the bundled config sets `mode`.
#   threshold  - decision cut on the calibrated P(grounded).
#   prior      - the Bayesian PRIOR for fitting (bambi/PyMC): per-coefficient
#                Normal(mu, sigma). This is the single source of truth for the
#                prior - it is NOT hardcoded in Python. `calibrate` seeds the
#                fit from here (or from a previous posterior with --from).
#   weights    - learned posterior means written by `config set-calibrator`.
#                Absent until you calibrate locally. When present and
#                engine=calibrated, grounding scores sigma(weights . features).
#
# Coefficients: Intercept + the seven features
# (exact, fuzzy, bm25_recall, semantic, voters, lexical_cosupport,
# entity_absent). `semantic` is the ramped, model/language-portable
# semantic_ratio. Prior intent: word overlap OR a strong semantic_ratio
# confirms; weak topical signal and entity-absent fabrications do not.
calibration:
  mode: lexical                    # lexical (default) | semantic (the OV cascade switch, see `semantic:` below)
  threshold: 0.5
  prior:
    Intercept:          {mu: -3.0, sigma: 1.0}
    exact:              {mu:  6.0, sigma: 2.0}
    fuzzy:              {mu:  2.0, sigma: 2.0}
    bm25_recall:        {mu:  2.5, sigma: 2.0}
    semantic:           {mu:  4.5, sigma: 2.0}
    voters:             {mu:  1.5, sigma: 1.5}
    lexical_cosupport:  {mu:  2.0, sigma: 1.5}
    entity_absent:      {mu: -3.0, sigma: 1.5}
    nli_entail:         {mu:  5.0, sigma: 2.0}
    nli_contra:         {mu: -5.0, sigma: 2.0}
  # ---- semantic switch (mode: semantic) ------------------------------------
  # The orthogonal on/off switch (`mode: semantic`, or `--semantic` on the CLI) composes
  # the OpenVINO cross-encoder cascade with whatever `lexical_effort` tier is selected -
  # it is NOT itself an effort tier. The lexical verdict decides whenever its P(grounded)
  # is OUTSIDE escalation_band; the uncertain band - and cross-lingual claims the lexical
  # tier cannot ground - escalate to the bge-m3 pre-filter + bge-reranker + mDeBERTa-NLI
  # cascade (cosine_gate / cascade_band early-exits), fused by the frozen joint logistic
  # below: sigmoid(Intercept + Σ w·feature), no scikit-learn at inference. Fit OOF on the
  # 2752 gold (W1 escalation wiring, macro-F1 0.822 vs 0.759 lexical-only). Regenerate via
  # experiments/grounding-semantic/joint_wirings.py; see reports/grounding_joint_wirings.md.
  semantic:
    feature_order: [lex_p, rr_max, nli_ent, cos_max, nli_contra, lex_contra, lex_blocked]
    weights:
      Intercept: -5.186199
      lex_p: 5.300125
      rr_max: 1.037737
      nli_ent: 2.216246
      cos_max: 3.751941
      nli_contra: -0.897544
      lex_contra: -0.630457
      lex_blocked: 2.914284
    threshold: 0.579798
    escalation_band: [0.129863, 0.986142]
    cosine_gate: [0.493, 0.739]
    cascade_band: [0.01, 0.66]
    top_k: 8
  # ---- solution-tier manifolds (mode=lexical) ------------------------------
  # Per-tier frozen-weight logistic verdicts. In lexical mode, grounding loads
  # the tier named by the top-level `lexical_effort` key and scores
  # sigmoid(Intercept + Σ w·feature), deciding
  # CONFIRMED at >= threshold (no scikit-learn at inference). feature_order is
  # the coefficient/audit contract and must match the tier's feature list.
  # chunk_max_chars / chunk_overlap_ratio set the recursive-chunk operating
  # point (300 / 0.1) used to compute the features, independent of the general
  # cascade's 1500 / 0.25. Regenerate with `document-processing train-lexical
  # --effort {low,medium,high} --data PATH ...`. Fit on private RAG 2752 gold +
  # VitaminC dev (SUPPORTS->1, REFUTES->0, NEI dropped).
  lexical_manifolds:
    low:
      feature_order:
      - r1_direct
      - charng
      - fuzzy
      - anchor
      - anchor_mm
      - oracle
      - top3
      - specificity
      - conflict_n
      - conflict_flag
      - num_edit_mag
      - unmatched_rarity
      - max_unmatched
      threshold: 0.45
      weights:
        Intercept: 1.970069
        r1_direct: -3.426245
        charng: 2.657733
        fuzzy: 1.383015
        anchor: 0.305115
        anchor_mm: -0.154112
        oracle: -0.961777
        top3: 1.793644
        specificity: 0.968138
        conflict_n: -0.254483
        conflict_flag: -1.708215
        num_edit_mag: 1.944355
        unmatched_rarity: -5.683108
        max_unmatched: 1.133431
      chunk_max_chars: 300
      chunk_overlap_ratio: 0.1
    medium:
      feature_order:
      - r1_direct
      - charng
      - fuzzy
      - anchor
      - anchor_mm
      - oracle
      - top3
      - specificity
      - conflict_n
      - conflict_flag
      - num_edit_mag
      - unmatched_rarity
      - max_unmatched
      - is_en
      - same_lang
      - wn_antonym_flip
      threshold: 0.4
      weights:
        Intercept: 1.237915
        r1_direct: -1.500626
        charng: 3.024769
        fuzzy: 2.139417
        anchor: 0.321914
        anchor_mm: 0.179276
        oracle: 0.353838
        top3: 2.484652
        specificity: 0.356991
        conflict_n: -0.435647
        conflict_flag: -2.102543
        num_edit_mag: 2.285132
        unmatched_rarity: -2.762577
        max_unmatched: 0.446687
        is_en: -2.305987
        same_lang: -0.386071
        wn_antonym_flip: -2.237083
      chunk_max_chars: 300
      chunk_overlap_ratio: 0.1
    high:
      feature_order:
      - r1_direct
      - r1_mt
      - r1_best
      - charng
      - fuzzy
      - anchor
      - anchor_mm
      - oracle
      - top3
      - same_lang
      - is_en
      - specificity
      - conflict_n
      - conflict_flag
      - num_edit_mag
      - wn_antonym_flip
      - unmatched_rarity
      - max_unmatched
      # Single global cut. The Round 10-11 synthetic non-English negatives (claude -p
      # translate + fidelity-verify, train-only) let the weights carry the cross-lingual
      # signal directly, so one threshold catches both English and non-English
      # hallucinations - retiring the Round 9 language-conditional threshold_non_en.
      # Real gold v2: non-EN TNR 0.78, EN F1 up, VitaminC/articles hold. See Round 12.
      threshold: 0.5
      weights:
        Intercept: -4.923953
        r1_direct: -3.724295
        r1_mt: 1.372516
        r1_best: 4.076367
        charng: 2.434198
        fuzzy: 2.767816
        anchor: 0.133409
        anchor_mm: 0.260883
        oracle: 0.249215
        top3: 2.222120
        same_lang: 1.236576
        is_en: -0.898982
        specificity: 1.040784
        conflict_n: 0.687994
        conflict_flag: -2.928168
        num_edit_mag: 2.417809
        wn_antonym_flip: -2.704356
        unmatched_rarity: 0.100700
        max_unmatched: 1.038760
      chunk_max_chars: 300
      chunk_overlap_ratio: 0.1
