<!--
  05_programmatic_tools.svg - Token cost comparison: per-call model vs code execution
  Shows: two horizontal bars demonstrating 98.7% token reduction via code execution.
  Per-call bar (~150,000 tokens) vs code execution bar (~2,000 tokens) with a
  large centred callout showing "98.7% reduction". Two summary rows and source footer.
  Intent: single-glance proof that programmatic tools dramatically reduce context usage.
  Theme: project palette.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 550" preserveAspectRatio="xMidYMid meet">
  <style>
    .fg-1 { fill: #1a4d94; }
    .fg-2 { fill: #2a5f9e; }
    .fg-3 { fill: #4a7ba7; }
    .fg-4 { fill: #6b8db5; }
    .accent-1 { fill: #00a6ff; }
    .accent-2 { fill: #66ccff; }
    .bar-slow { fill: #6b8db5; }
    .bar-fast { fill: #00a6ff; }
    .on-bar { fill: #ffffff; }
    @media (prefers-color-scheme: dark) {
      .fg-1 { fill: #cfe6ff; }
      .fg-2 { fill: #a8d4f0; }
      .fg-3 { fill: #7ec0e6; }
      .fg-4 { fill: #5aafc5; }
      .accent-1 { fill: #4dc4ff; }
      .accent-2 { fill: #88ddff; }
      .bar-slow { fill: #5aafc5; }
      .bar-fast { fill: #4dc4ff; }
      .on-bar { fill: #0a1a2e; }
    }
  </style>

  <!-- === GRID REFERENCE ===
    viewBox: 1100 x 550
    Margins: L=40 R=40

    Title: y=30..60 (h=30)
    Subtitle: y=60..80

    BAR CHART AREA: x=220..1060 (w=840), y=100..350
      Label column: x=40..210 (w=170)
      Bar area: x=220..1060 (w=840)
      Per-call bar scale: 150,000 tokens = full width 840px → 1px per 178.6 tokens
        Per-call bar: x=220..1060 (840px) = 150,000 tokens (full)
        Code exec bar: 2,000/150,000 * 840 = 11.2px ≈ 11px wide. Visually too thin.
        Use log-scale visual: per-call bar = 840px, code exec bar = 840 * log(2000)/log(150000) = 840 * 3.301/5.176 = 535px
        But that misrepresents. Better: use exaggerated proportional scale.
        Per-call: 840px wide. Code exec: show as 12px (the actual ratio) but label it clearly.
        Actually use "area" encoding: show two bars where the per-call dominates completely.
        Use a scale that makes the code-exec bar visible (at least 20px) while showing the per-call bar as 800px:
        Per-call bar: 800px wide at y=130..175 (h=45)
        Code exec bar: 20px wide at y=200..230 (h=30) - same bar area starting at x=220

    CALLOUT "98.7% reduction": large text at x=600, y=280

    SUMMARY ROWS: y=310..360
      Row 1: "Intermediate results stay out of context"
      Row 2: "Persist-or-discard is local"

    SOURCE: y=380

    AXIS: x=220..1060 at y=358 (below bars)

    Bar overlap check:
      Per-call bar group: x=220..1020, y=130..175  outer: x=214..1026, y=124..181
      Code exec bar group: x=220..240, y=200..230  outer: x=214..246, y=194..236
      These have h-overlap (both start at x=220, outer x=214..1026 vs 214..246).
      The per-call bar bottom outer=181, code bar top outer=194. Vertical gap = 13px. No overlap ✓
      But h-overlap: per-call outer x=214..1026 includes code bar outer x=214..246. That's a CONTAINED issue (code bar inside per-call's x range).
      Since they are in different y ranges (no vertical overlap), the checker may not flag this.

    AXIS line group: y=358, x=220..1060.
    Check: Per-call outer bot=181. Code exec outer bot=236. Callout y≈280. Summary rows y=310..360.
    No overlaps expected between callout text and bars (bars end at y=230, callout at y≈270).

    Outer clearances:
      Per-call label text: x=40..210, y=130..175 outer. Per-call bar outer starts at x=214.
        Text outer right=214. Bar outer left=214. Touching - need 1px clearance.
        Move bar to x=222. Then bar outer left=216. Text outer right=214. Clearance=2px ✓
        Alternatively: label text ends at x=210, outer right=214. Bar inner starts at 222.
        Bar outer=216..1026. Text outer=32..214. Clearance: 216-214=2px ✓
  === -->

  <!-- Title -->
  <text x="550" y="44" class="fg-1" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" text-anchor="middle">Per-claim token cost: model round trips vs code execution</text>
  <text x="550" y="66" class="fg-3" font-family="Segoe UI, Arial, sans-serif" font-size="10" text-anchor="middle">Programmatic tools keep intermediate results out of the context window</text>

  <!-- === Bar 1: Per-call model round trips (x=222..1060, y=130..175) === -->
  <g id="bar-per-call">
    <rect x="222" y="130" width="838" height="45" rx="3" ry="3" class="bar-slow"/>
    <text x="641" y="157" class="on-bar" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Per-call model round trips: ~150,000 tokens</text>
  </g>
  <text x="212" y="157" class="fg-3" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="600" text-anchor="end">Per-call model</text>

  <!-- === Bar 2: Code execution (x=222..232, y=200..230) === -->
  <!-- Bar is 12px wide (≈2000/150000 * 840 = 11px) + label outside the bar -->
  <g id="bar-code-exec">
    <rect x="222" y="200" width="12" height="30" rx="2" ry="2" class="bar-fast"/>
  </g>
  <text x="212" y="220" class="fg-2" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="600" text-anchor="end">Code execution</text>
  <text x="247" y="220" class="accent-1" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="700">~2,000 tokens</text>

  <!-- Axis tick line -->
  <line x1="222" y1="252" x2="1060" y2="252" stroke="#6b8db5" stroke-width="0.7" opacity="0.4"/>
  <text x="222" y="268" class="fg-4" font-family="Segoe UI, Arial, sans-serif" font-size="8" text-anchor="middle">0</text>
  <text x="1060" y="268" class="fg-4" font-family="Segoe UI, Arial, sans-serif" font-size="8" text-anchor="middle">150,000 tokens</text>

  <!-- === Large callout: "98.7% reduction" (y=295) === -->
  <text x="550" y="305" class="fg-1" font-family="Segoe UI, Arial, sans-serif" font-size="36" font-weight="700" text-anchor="middle">98.7% reduction</text>
  <text x="550" y="330" class="fg-4" font-family="Segoe UI, Arial, sans-serif" font-size="11" text-anchor="middle">from ~150,000 tokens to ~2,000 tokens per verification run</text>

  <!-- === Summary rows (y=370, 392) === -->
  <text x="550" y="372" class="fg-3" font-family="Segoe UI, Arial, sans-serif" font-size="11" text-anchor="middle">&#8226; Intermediate results stay out of context &#8226; Persist-or-discard logic is local</text>

  <!-- Source footer -->
  <text x="550" y="420" class="fg-4" font-family="Segoe UI, Arial, sans-serif" font-size="9" text-anchor="middle" font-style="italic">Source: Anthropic, Code execution with MCP, Nov 2025</text>

</svg>
