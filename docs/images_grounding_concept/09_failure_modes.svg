<!--
  09_failure_modes.svg - Four failure mode cards for the grounding pipeline
  Shows: 2x2 grid of failure mode cards, each with a micro-metaphor illustration
  and a one-line cause. The visual metaphors make abstract limitations visceral.
  Hypothesis: the four limitations become "ah, that's when this breaks" at a glance
  when each has a distinct visual metaphor rather than a bullet point.
  Theme: project palette.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 600" preserveAspectRatio="xMidYMid meet">
  <style>
    .fg-1 { fill: #1a4d94; }
    .fg-2 { fill: #2a5f9e; }
    .fg-3 { fill: #4a7ba7; }
    .fg-4 { fill: #6b8db5; }
    .accent-1 { fill: #00a6ff; }
    .accent-2 { fill: #66ccff; }
    .arrow-fill { fill: #00a6ff; }
    .card-fill { fill: #f5f7fa; }
    .stroke-a1 { stroke: #00a6ff; fill: none; }
    .stroke-fg3 { stroke: #4a7ba7; fill: none; }
    @media (prefers-color-scheme: dark) {
      .fg-1 { fill: #cfe6ff; }
      .fg-2 { fill: #a8d4f0; }
      .fg-3 { fill: #7ec0e6; }
      .fg-4 { fill: #5aafc5; }
      .accent-1 { fill: #4dc4ff; }
      .accent-2 { fill: #88ddff; }
      .arrow-fill { fill: #4dc4ff; }
      .card-fill { fill: #0f2a45; }
      .stroke-a1 { stroke: #4dc4ff; fill: none; }
      .stroke-fg3 { stroke: #7ec0e6; fill: none; }
    }
  </style>

  <!-- === GRID ===
    viewBox: 1100 x 600
    Title: y=34
    Footer: y=584

    Card grid: 2 cols x 2 rows
    Margins: L=30, R=30
    Inter-card gap: 24px
    Card width: (1100-30-30-24)/2 = 508
    Card height: (500-24)/2 = 238

    Col 1: x=30..538    col 2: x=562..1070
    Row 1: y=60..298    row 2: y=322..560

    Card centers:
      TL: (284, 179)    TR: (816, 179)
      BL: (284, 441)    BR: (816, 441)

    Accent bar: height=5 at card top, no rx
    Card padding: 20px sides, 16px top from accent bar
    Illustration zone: y=accent_bottom+60 for ~80x80 centred
    Title: y=accent_bottom+20
    Subtitle (cause): card bottom - 30px
  === -->

  <!-- === LAYOUT TOPOLOGY ===
    2x2 grid: TL=absent-source, TR=dense-text-fire, BL=heavy-model-cost, BR=numeric-collision
    Each card: accent bar + title + illustration metaphor + cause line
  === -->

  <!-- HEADER -->
  <g id="header">
    <text x="550" y="34" class="fg-1" font-family="Segoe UI, Arial, sans-serif"
          font-size="12" font-weight="700" text-anchor="middle" letter-spacing="0.6">
      FAILURE MODES &#8212; WHEN THE GROUNDER BREAKS DOWN
    </text>
  </g>

  <!-- ===================== CARD 1: Absent source (TL) ===================== -->
  <g id="card-absent-source">
    <!-- flat-top / rounded-bottom card body (r=8 on bottom corners only) -->
    <path d="M 30,60 H 538 V 290 Q 538,298 530,298 H 38 Q 30,298 30,290 Z"
          class="card-fill" fill-opacity="1" stroke="#4a7ba7" stroke-width="1"/>
    <!-- Hue tint overlay: light-orange (#d4a04a) wash at 3% to signal "failure mode" semantic - gentlest among the 4 since "absent" is the mildest mode -->
    <path d="M 30,60 H 538 V 290 Q 538,298 530,298 H 38 Q 30,298 30,290 Z"
          fill="#d4a04a" fill-opacity="0.03" stroke="none"/>
    <rect x="30" y="60" width="508" height="5" fill="#6b8db5" opacity="0.7"/>

    <!-- Title -->
    <text x="50" y="85" class="fg-1" font-family="Segoe UI, Arial, sans-serif"
          font-size="12" font-weight="700">Absent source</text>

    <!-- Illustration: folder with question mark at absolute coords -->
    <!-- Folder centred at (284, 200) - shifted down +40px so illustration sits in middle of card body, not crammed near the top -->
    <!-- Folder tab -->
    <rect x="246" y="171" width="32" height="13" rx="4" ry="4"
          fill="#6b8db5" fill-opacity="0.15" stroke="#6b8db5" stroke-width="1.2"/>
    <!-- Folder body: w=76 h=48 so h<50, not a card -->
    <rect x="246" y="181" width="76" height="48" rx="4" ry="4"
          fill="#6b8db5" fill-opacity="0.15" stroke="#6b8db5" stroke-width="1.2"/>
    <!-- Question mark -->
    <text x="284" y="217" class="fg-4" font-family="Segoe UI, Arial, sans-serif"
          font-size="30" font-weight="700" text-anchor="middle" opacity="0.45">?</text>

    <!-- Cause line - bottom-anchored at y=278 (12px above path turn at y=290) -->
    <text x="284" y="278" class="fg-4" font-family="Segoe UI, Arial, sans-serif"
          font-size="9" text-anchor="middle" font-style="italic">NOT FOUND is correct here. Claim may still be true elsewhere.</text>

    <!-- Accent label -->
    <rect x="30" y="60" width="5" height="238" rx="0" ry="0" fill="#6b8db5" opacity="0.3"/>
    <text x="50" y="103" class="fg-3" font-family="Segoe UI, Arial, sans-serif"
          font-size="8.5">Corpus does not contain the source document.</text>
    <text x="50" y="118" class="fg-3" font-family="Segoe UI, Arial, sans-serif"
          font-size="8.5">Grounder cannot confirm what is not present.</text>
  </g>

  <!-- ===================== CARD 2: Dense-text fire (TR) ===================== -->
  <g id="card-dense-fire">
    <!-- flat-top / rounded-bottom card body -->
    <path d="M 562,60 H 1070 V 290 Q 1070,298 1062,298 H 570 Q 562,298 562,290 Z"
          class="card-fill" fill-opacity="1" stroke="#4a7ba7" stroke-width="1"/>
    <!-- Hue tint overlay: deeper orange (#da8230) wash at 4% - "fire" semantic deserves the stronger warm -->
    <path d="M 562,60 H 1070 V 290 Q 1070,298 1062,298 H 570 Q 562,298 562,290 Z"
          fill="#da8230" fill-opacity="0.04" stroke="none"/>
    <rect x="562" y="60" width="508" height="5" fill="#66ccff" opacity="0.7"/>

    <!-- Title -->
    <text x="582" y="85" class="fg-1" font-family="Segoe UI, Arial, sans-serif"
          font-size="12" font-weight="700">Dense-text fire</text>

    <!-- Illustration: doc-rects in orbit around central pulse (centred at 816,201) -->
    <!-- All absolute SVG coords, illustration zone: y=130..270; pulse shifted +25px to center -->
    <rect x="746" y="155" width="28" height="18" rx="2" fill="#66ccff" fill-opacity="0.25" stroke="#66ccff" stroke-width="0.8"/>
    <rect x="788" y="151" width="28" height="18" rx="2" fill="#66ccff" fill-opacity="0.25" stroke="#66ccff" stroke-width="0.8"/>
    <rect x="832" y="163" width="28" height="18" rx="2" fill="#66ccff" fill-opacity="0.25" stroke="#66ccff" stroke-width="0.8"/>
    <rect x="850" y="190" width="28" height="18" rx="2" fill="#66ccff" fill-opacity="0.25" stroke="#66ccff" stroke-width="0.8"/>
    <rect x="820" y="223" width="28" height="18" rx="2" fill="#66ccff" fill-opacity="0.25" stroke="#66ccff" stroke-width="0.8"/>
    <rect x="752" y="233" width="28" height="18" rx="2" fill="#66ccff" fill-opacity="0.25" stroke="#66ccff" stroke-width="0.8"/>
    <!-- Central pulse -->
    <circle cx="816" cy="201" r="7" fill="#66ccff" fill-opacity="0.5"/>
    <circle cx="816" cy="201" r="14" fill="none" stroke="#66ccff" stroke-width="0.9" opacity="0.3"/>
    <circle cx="816" cy="201" r="22" fill="none" stroke="#66ccff" stroke-width="0.5" opacity="0.18"/>
    <!-- Repeated term label - moved to y=138 (was 150) for 13px gap above the first doc-rect at y=151 -->
    <text x="816" y="138" class="accent-2" font-family="Segoe UI, Arial, sans-serif"
          font-size="8" text-anchor="middle" font-weight="700" opacity="0.8">rare term &#183; rare term &#183; rare term</text>

    <!-- Description -->
    <text x="582" y="103" class="fg-3" font-family="Segoe UI, Arial, sans-serif"
          font-size="8.5">Same rare term appears across many passages.</text>
    <text x="582" y="118" class="fg-3" font-family="Segoe UI, Arial, sans-serif"
          font-size="8.5">Fuzzy &#43; BM25 fire on each one, inflating score.</text>

    <!-- Cause line - bottom-anchored at y=278 (12px above path turn at y=290) -->
    <text x="816" y="278" class="fg-4" font-family="Segoe UI, Arial, sans-serif"
          font-size="9" text-anchor="middle" font-style="italic">Fuzzy and BM25 over-fire when rare terms repeat across passages.</text>

    <rect x="562" y="60" width="5" height="238" rx="0" ry="0" fill="#66ccff" opacity="0.3"/>
  </g>

  <!-- ===================== CARD 3: Heavy-model cost (BL) ===================== -->
  <g id="card-heavy-model">
    <!-- flat-top / rounded-bottom card body -->
    <path d="M 30,322 H 538 V 552 Q 538,560 530,560 H 38 Q 30,560 30,552 Z"
          class="card-fill" fill-opacity="1" stroke="#4a7ba7" stroke-width="1"/>
    <!-- Hue tint overlay: light-orange (#d4a04a) wash at 4% - "cost/weight" semantic, mid-warmth -->
    <path d="M 30,322 H 538 V 552 Q 538,560 530,560 H 38 Q 30,560 30,552 Z"
          fill="#d4a04a" fill-opacity="0.04" stroke="none"/>
    <rect x="30" y="322" width="508" height="5" fill="#00a6ff" opacity="0.6"/>

    <!-- Title -->
    <text x="50" y="347" class="fg-1" font-family="Segoe UI, Arial, sans-serif"
          font-size="12" font-weight="700">Heavy-model cost</text>

    <!-- Illustration: stacked disk layers shifted +28px down to centre in card body -->
    <!-- Stack now centred at (224, 458) -->
    <!-- Bottom disk -->
    <ellipse cx="224" cy="476" rx="42" ry="12" fill="#00a6ff" fill-opacity="0.12" stroke="#00a6ff" stroke-width="1.2"/>
    <!-- Middle disk body -->
    <rect x="182" y="458" width="84" height="18" class="card-fill"/>
    <ellipse cx="224" cy="458" rx="42" ry="12" fill="#00a6ff" fill-opacity="0.18" stroke="#00a6ff" stroke-width="1.2"/>
    <!-- Top disk body -->
    <rect x="182" y="440" width="84" height="18" class="card-fill"/>
    <ellipse cx="224" cy="440" rx="42" ry="12" fill="#00a6ff" fill-opacity="0.25" stroke="#00a6ff" stroke-width="1.2"/>
    <!-- Size label placed to the right with 20px clearance from disk right edge (224+42=266) -->
    <text x="292" y="448" class="accent-1" font-family="Segoe UI, Arial, sans-serif"
          font-size="10" font-weight="700">&#126;500 MB</text>
    <text x="292" y="462" class="fg-4" font-family="Segoe UI, Arial, sans-serif"
          font-size="8">embedding</text>
    <text x="292" y="475" class="fg-4" font-family="Segoe UI, Arial, sans-serif"
          font-size="8">model</text>

    <!-- Description -->
    <text x="50" y="365" class="fg-3" font-family="Segoe UI, Arial, sans-serif"
          font-size="8.5">Semantic layer (FAISS &#43; multilingual-E5-small)</text>
    <text x="50" y="380" class="fg-3" font-family="Segoe UI, Arial, sans-serif"
          font-size="8.5">requires &#126;500 MB RAM and adds latency.</text>

    <!-- Cause line - bottom-anchored at y=536 (16px above path turn at y=552) -->
    <text x="284" y="536" class="fg-4" font-family="Segoe UI, Arial, sans-serif"
          font-size="9" text-anchor="middle" font-style="italic">Semantic layer cuts false negatives &#8212; at memory and latency cost.</text>

    <rect x="30" y="322" width="5" height="238" rx="0" ry="0" fill="#00a6ff" opacity="0.3"/>
  </g>

  <!-- ===================== CARD 4: Numeric collision (BR) ===================== -->
  <g id="card-numeric-collision">
    <!-- flat-top / rounded-bottom card body -->
    <path d="M 562,322 H 1070 V 552 Q 1070,560 1062,560 H 570 Q 562,560 562,552 Z"
          class="card-fill" fill-opacity="1" stroke="#4a7ba7" stroke-width="1"/>
    <!-- Hue tint overlay: deeper orange (#da8230) wash at 4% - "collision" semantic, stronger warm -->
    <path d="M 562,322 H 1070 V 552 Q 1070,560 1062,560 H 570 Q 562,560 562,552 Z"
          fill="#da8230" fill-opacity="0.04" stroke="none"/>
    <!-- Accent bar in fg-2 deeper blue (#2a5f9e) - distinguishes from card 3's #00a6ff for hue variety across the 4 cards -->
    <rect x="562" y="322" width="508" height="5" fill="#2a5f9e" opacity="0.7"/>

    <!-- Title -->
    <text x="582" y="347" class="fg-1" font-family="Segoe UI, Arial, sans-serif"
          font-size="12" font-weight="700">Numeric collision</text>

    <!-- Illustration: two number blobs with fuzzy equals - shifted +24px down to centre in card body -->
    <!-- $2M blob centred at (660, 454) -->
    <rect x="615" y="432" width="90" height="44" rx="20" ry="20"
          fill="#1a4d94" fill-opacity="0.12" stroke="#1a4d94" stroke-width="1.3"/>
    <text x="660" y="460" class="fg-1" font-family="Segoe UI, Arial, sans-serif"
          font-size="16" font-weight="700" text-anchor="middle">$2M</text>

    <!-- Fuzzy dashed equals: thin rect dashes between blobs (x=710..734) -->
    <rect x="712" y="447" width="6" height="2.5" fill="#6b8db5" opacity="0.7"/>
    <rect x="721" y="447" width="6" height="2.5" fill="#6b8db5" opacity="0.7"/>
    <rect x="730" y="447" width="6" height="2.5" fill="#6b8db5" opacity="0.7"/>
    <rect x="712" y="455" width="6" height="2.5" fill="#6b8db5" opacity="0.7"/>
    <rect x="721" y="455" width="6" height="2.5" fill="#6b8db5" opacity="0.7"/>
    <rect x="730" y="455" width="6" height="2.5" fill="#6b8db5" opacity="0.7"/>

    <!-- Warning triangle below equals -->
    <text x="722" y="480" class="fg-4" font-family="Segoe UI, Arial, sans-serif"
          font-size="11" text-anchor="middle" opacity="0.6">&#9651;</text>

    <!-- $2 trillion blob centred at (860, 454) -->
    <rect x="745" y="432" width="120" height="44" rx="20" ry="20"
          fill="#1a4d94" fill-opacity="0.08" stroke="#4a7ba7" stroke-width="1" stroke-dasharray="4 2"/>
    <text x="805" y="460" class="fg-3" font-family="Segoe UI, Arial, sans-serif"
          font-size="13" font-weight="700" text-anchor="middle">$2 trillion</text>

    <!-- Description -->
    <text x="582" y="365" class="fg-3" font-family="Segoe UI, Arial, sans-serif"
          font-size="8.5">Fuzzy match: &#8220;$2M&#8221; &#8773; &#8220;$2 trillion&#8221; by edit-distance.</text>
    <text x="582" y="380" class="fg-3" font-family="Segoe UI, Arial, sans-serif"
          font-size="8.5">Numeric-consistency pass is required to catch it.</text>

    <!-- Cause line - bottom-anchored at y=536 (16px above path turn at y=552) -->
    <text x="816" y="536" class="fg-4" font-family="Segoe UI, Arial, sans-serif"
          font-size="9" text-anchor="middle" font-style="italic">Fuzzy match confirms $2M against $2 trillion. Numeric-consistency pass catches it.</text>

    <rect x="562" y="322" width="5" height="238" rx="0" ry="0" fill="#2a5f9e" opacity="0.3"/>
  </g>

  <!-- FOOTER -->
  <g id="content">
    <text x="550" y="584" class="fg-4" font-family="Segoe UI, Arial, sans-serif"
          font-size="9" text-anchor="middle" font-style="italic">
      Each failure mode has a deterministic cause. None invalidates grounding &#8212; each calls for a targeted mitigation.
    </text>
  </g>

</svg>
