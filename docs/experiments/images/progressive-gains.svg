<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" font-family="'Segoe UI', system-ui, sans-serif">
  <!-- Progressive gains across hypothesis rounds: joint per-corpus macro-F1.
       VitaminC (contrastive corpus) climbs as contradiction features are added;
       Private RAG (omission corpus) holds; round 3 plateaus (lexical saturation).
       Ablation on the 1260 snapshot; pattern replicates on 2752. -->
  <rect width="960" height="560" fill="#0a1a24"/>

  <!-- titles -->
  <text x="60" y="46" fill="#eaf2f6" font-size="26" font-weight="700">Progressive gains across hypothesis rounds</text>
  <text x="60" y="72" fill="#7fa4b4" font-size="15">Joint one-logistic, per-corpus macro-F1 — each step adds one deterministic lexical feature</text>

  <!-- legend (in the empty mid-left band between the two lines) -->
  <g font-size="14">
    <line x1="196" y1="208" x2="230" y2="208" stroke="#0096d1" stroke-width="3.5"/>
    <circle cx="213" cy="208" r="4.5" fill="#0096d1"/>
    <text x="240" y="213" fill="#bcd2dc">Private RAG — omission negatives (held)</text>
    <line x1="196" y1="234" x2="230" y2="234" stroke="#da8230" stroke-width="3.5"/>
    <circle cx="213" cy="234" r="4.5" fill="#da8230"/>
    <text x="240" y="239" fill="#bcd2dc">VitaminC — contrastive negatives (lifted)</text>
  </g>

  <!-- y gridlines + labels (0.50..0.90 over plot y 440..70) -->
  <g stroke="#1c3b49" stroke-width="1">
    <line x1="150" y1="440" x2="860" y2="440"/>
    <line x1="150" y1="347.5" x2="860" y2="347.5"/>
    <line x1="150" y1="255" x2="860" y2="255"/>
    <line x1="150" y1="162.5" x2="860" y2="162.5"/>
    <line x1="150" y1="70" x2="860" y2="70"/>
  </g>
  <g fill="#5a7a88" font-size="12" text-anchor="end">
    <text x="138" y="444">0.50</text>
    <text x="138" y="351.5">0.60</text>
    <text x="138" y="259">0.70</text>
    <text x="138" y="166.5">0.80</text>
    <text x="138" y="74">0.90</text>
  </g>
  <text x="58" y="255" fill="#7fa4b4" font-size="13" transform="rotate(-90 58 255)" text-anchor="middle">macro-F1</text>

  <!-- axes -->
  <line x1="150" y1="70" x2="150" y2="440" stroke="#3a5a68" stroke-width="1.5"/>
  <line x1="150" y1="440" x2="860" y2="440" stroke="#3a5a68" stroke-width="1.5"/>

  <!-- saturation band over the R3 step -->
  <rect x="623.3" y="70" width="236.7" height="370" fill="#ffffff" opacity="0.03"/>
  <text x="741.6" y="92" fill="#5a7a88" font-size="12" text-anchor="middle" font-style="italic">R3: no further gain</text>

  <!-- Private RAG line (held) -->
  <polyline points="150,115.3 386.7,115.3 623.3,123.6 860,123.6" fill="none" stroke="#0096d1" stroke-width="3.5"/>
  <g fill="#0096d1">
    <circle cx="150" cy="115.3" r="5.5"/>
    <circle cx="386.7" cy="115.3" r="5.5"/>
    <circle cx="623.3" cy="123.6" r="5.5"/>
    <circle cx="860" cy="123.6" r="5.5"/>
  </g>
  <g fill="#9fd3e8" font-size="13" text-anchor="middle" font-weight="600">
    <text x="150" y="104">0.851</text>
    <text x="386.7" y="104">0.851</text>
    <text x="623.3" y="112">0.842</text>
    <text x="860" y="112">0.842</text>
  </g>

  <!-- VitaminC line (lifted) -->
  <polyline points="150,410.4 386.7,380.8 623.3,268.9 860,268.9" fill="none" stroke="#da8230" stroke-width="3.5"/>
  <g fill="#da8230">
    <circle cx="150" cy="410.4" r="5.5"/>
    <circle cx="386.7" cy="380.8" r="5.5"/>
    <circle cx="623.3" cy="268.9" r="5.5"/>
    <circle cx="860" cy="268.9" r="5.5"/>
  </g>
  <g fill="#f0b079" font-size="13" text-anchor="middle" font-weight="600">
    <text x="150" y="432">0.532</text>
    <text x="386.7" y="402">0.564</text>
    <text x="623.3" y="290">0.685</text>
    <text x="860" y="290">0.685</text>
  </g>

  <!-- gain annotation -->
  <text x="430" y="334" fill="#d4a04a" font-size="13" font-weight="600">▲ +0.15 on VitaminC</text>

  <!-- x category labels -->
  <g fill="#bcd2dc" font-size="13.5" text-anchor="middle">
    <text x="150" y="468">base</text><text x="150" y="486" fill="#7fa4b4" font-size="12">lexical only</text>
    <text x="386.7" y="468">+ value-conflict</text><text x="386.7" y="486" fill="#7fa4b4" font-size="12">R1 (numeric/entity edit)</text>
    <text x="623.3" y="468">+ antonym-flip</text><text x="623.3" y="486" fill="#7fa4b4" font-size="12">R1→R2 (WordNet, shipped)</text>
    <text x="860" y="468">R3 structural</text><text x="860" y="486" fill="#7fa4b4" font-size="12">null (saturation)</text>
  </g>

  <!-- footer -->
  <text x="60" y="528" fill="#4f6f7d" font-size="11.5">Hold-vs-collapse — VitaminC rises 0.53 → 0.69 while Private RAG holds ~0.85; round 3 adds nothing, the pure-lexical signal is saturated.</text>
  <text x="60" y="546" fill="#3f5a66" font-size="11">Joint per-corpus-tuned threshold, 1260-snapshot ablation; replicates on the live 2752 gold (VitaminC 0.555 → 0.661).</text>
</svg>
