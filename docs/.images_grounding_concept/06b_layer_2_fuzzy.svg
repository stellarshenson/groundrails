<!--
  06b_layer_2_fuzzy.svg - Layer 2 per-method banner: Fuzzy Levenshtein grounding
  Shows: claim string (top row) and passage string (bottom row) as word-rects;
  vertical tick connectors between aligned matching words; delta markers on
  substituted words; continuous score 0.82 on the right.
  Hypothesis: Layer 2 catches paraphrases via edit-distance alignment. The visual
  makes the "2 edits" concept concrete - most words align, a few are substituted.
  Intent: standalone close-up of the fuzzy-match method for the grounding brief.
  Theme: project palette.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 180" preserveAspectRatio="xMidYMid meet">
  <style>
    .fg-1  { fill: #1a4d94; }
    .fg-2  { fill: #2a5f9e; }
    .fg-3  { fill: #4a7ba7; }
    .fg-4  { fill: #6b8db5; }
    .accent-1 { fill: #00a6ff; }
    .accent-2 { fill: #66ccff; }
    .arrow-fill  { fill: #00a6ff; }
    .on-chip { fill: #ffffff; }
    @media (prefers-color-scheme: dark) {
      .fg-1  { fill: #cfe6ff; }
      .fg-2  { fill: #a8d4f0; }
      .fg-3  { fill: #7ec0e6; }
      .fg-4  { fill: #5aafc5; }
      .accent-1 { fill: #4dc4ff; }
      .accent-2 { fill: #88ddff; }
      .arrow-fill  { fill: #4dc4ff; }
      .on-chip { fill: #0a1a2e; }
    }
  </style>

  <!-- === GRID ===
    viewBox: 1100 x 180
    Outer margins: L=20 R=20, top=18 bottom=18
    Usable h=144, usable w=1060

    LEFT panel (title): x=20..280 (w=260), y=18..162
      accent bar: x=20, y=18, w=260, h=5
      title baseline: y=52
      subtitle lines: y=68, y=82, y=96
      bottom tag: y=148

    GAP: x=280..298 (18px)

    CENTRE panel (alignment illustration): x=298..870 (w=572), y=18..162
      accent bar: x=298, y=18, w=572, h=5
      inner left padding: 314
      CLAIM row: y=52..67  (h=15) — top string
      PASSAGE row: y=102..117  (h=15) — bottom string
      Vertical gap between rows: 35px (y=67..102)
      Tick connectors (vertical lines) at matching word centre-x, y=67..102
        colours: accent-1 for matching ticks, fg-4 for edit ticks
      Delta label (Δ) at substituted passage word, centred above

      Word layout (7 words each, x starts 314):
        Word widths (all rows): 42, 58, 36, 64, 48, 40, 52  gap=8
        Total: 42+8+58+8+36+8+64+8+48+8+40+8+52 = 388
        Word centres-x: 314+21=335, 335+42+8+29=414, 414+29+8+29=480,
          480+18+8+32=538, 538+32+8+24=602, 602+24+8+20=654, 654+20+8+26=708

        Centre-x (c): 335, 414, 480, 538, 602, 654, 708
        Claim words   y=52..67
        Passage words y=102..117

      Match/edit assignments:
        word 0 (c=335): match — accent-1 tick, passage word accent-1 tint
        word 1 (c=414): match — accent-1 tick, passage word accent-1 tint
        word 2 (c=480): edit (substitution) — fg-4 dashed tick, passage word fg-4 + delta
        word 3 (c=538): match — accent-1 tick
        word 4 (c=602): edit — fg-4 dashed tick, passage word fg-4 + delta
        word 5 (c=654): match — accent-1 tick
        word 6 (c=708): match — accent-1 tick

      Caption: x=314, y=134  "alignment with 2 edits"
      Sub-labels: "CLAIM" x=314 y=46, "PASSAGE" x=314 y=97

    GAP: x=870..888 (18px)

    RIGHT panel (score chip): x=888..1080 (w=192), y=18..162
      accent bar: x=888, y=18, w=192, h=5
      chip: x=908..1060 (w=152, h=38, rx=19), y=52..90  centre y=71
      score text: x=984, y=76
      continuous label: y=108
      bottom note: y=148
  === -->

  <!-- === LAYOUT TOPOLOGY ===
    LEFT: v-stack label panel
    CENTRE: two horizontal word-rows (claim top, passage bottom) with vertical
            alignment ticks between them — pure illustration, no inter-panel routing
    RIGHT: score chip
  === -->

  <!-- LEFT panel -->
  <g id="panel-left">
    <rect x="20" y="18" width="260" height="144" rx="6" ry="6" fill="#1a4d94" fill-opacity="0.05" stroke="#00a6ff" stroke-width="1"/>
    <rect x="20" y="18" width="260" height="5" fill="#00a6ff" opacity="0.7"/>
    <text x="32" y="52" class="fg-1" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700">Layer 2: Fuzzy Levenshtein</text>
    <text x="32" y="70" class="fg-3" font-family="Segoe UI, Arial, sans-serif" font-size="9">Edit-distance alignment,</text>
    <text x="32" y="83" class="fg-3" font-family="Segoe UI, Arial, sans-serif" font-size="9">SIMD short-circuited.</text>
    <text x="32" y="96" class="fg-3" font-family="Segoe UI, Arial, sans-serif" font-size="9">~sub-ms/claim.</text>
    <text x="32" y="122" class="fg-4" font-family="Segoe UI, Arial, sans-serif" font-size="8">Ratio = matched chars /</text>
    <text x="32" y="134" class="fg-4" font-family="Segoe UI, Arial, sans-serif" font-size="8">max(len(claim), len(passage))</text>
    <text x="32" y="152" class="accent-1" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="600">continuous &#8226; paraphrase-tolerant</text>
  </g>

  <!-- CENTRE panel - alignment illustration -->
  <g id="panel-centre">
    <rect x="298" y="18" width="572" height="144" rx="6" ry="6" fill="#00a6ff" fill-opacity="0.04" stroke="#00a6ff" stroke-width="1"/>
    <rect x="298" y="18" width="572" height="5" fill="#00a6ff" opacity="0.7"/>

    <!-- Sub-labels: sit LEFT of the word-row band (x=314), vertically centred on their rows -->
    <!-- CLAIM row y=52..67 → label baseline at y=63 (midpoint 59.5, cap-height offset ~4) -->
    <text x="314" y="63" class="fg-4" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="600" letter-spacing="0.6">CLAIM</text>
    <!-- PASSAGE row y=102..117 → label baseline at y=113 -->
    <text x="314" y="113" class="fg-4" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="600" letter-spacing="0.6">PASSAGE</text>

    <!-- CLAIM row - 7 word rects at y=52..67, shifted RIGHT +66px -->
    <!-- word 0: x=380, w=42 -->
    <rect x="380" y="52" width="42" height="15" rx="2" fill="#4a7ba7" fill-opacity="0.45"/>
    <!-- word 1: x=430, w=58 -->
    <rect x="430" y="52" width="58" height="15" rx="2" fill="#4a7ba7" fill-opacity="0.45"/>
    <!-- word 2: x=496, w=36 - edit -->
    <rect x="496" y="52" width="36" height="15" rx="2" fill="#4a7ba7" fill-opacity="0.45"/>
    <!-- word 3: x=540, w=64 -->
    <rect x="540" y="52" width="64" height="15" rx="2" fill="#4a7ba7" fill-opacity="0.45"/>
    <!-- word 4: x=612, w=48 - edit -->
    <rect x="612" y="52" width="48" height="15" rx="2" fill="#4a7ba7" fill-opacity="0.45"/>
    <!-- word 5: x=668, w=40 -->
    <rect x="668" y="52" width="40" height="15" rx="2" fill="#4a7ba7" fill-opacity="0.45"/>
    <!-- word 6: x=716, w=52 -->
    <rect x="716" y="52" width="52" height="15" rx="2" fill="#4a7ba7" fill-opacity="0.45"/>

    <!-- PASSAGE row - 7 word rects at y=102..117, shifted RIGHT +66px -->
    <!-- word 0: x=380, w=42 - match -->
    <rect x="380" y="102" width="42" height="15" rx="2" fill="#00a6ff" fill-opacity="0.28"/>
    <!-- word 1: x=430, w=58 - match -->
    <rect x="430" y="102" width="58" height="15" rx="2" fill="#00a6ff" fill-opacity="0.28"/>
    <!-- word 2: x=496, w=36 - edit -->
    <rect x="496" y="102" width="36" height="15" rx="2" fill="#6b8db5" fill-opacity="0.25"/>
    <!-- word 3: x=540, w=64 - match -->
    <rect x="540" y="102" width="64" height="15" rx="2" fill="#00a6ff" fill-opacity="0.28"/>
    <!-- word 4: x=612, w=48 - edit -->
    <rect x="612" y="102" width="48" height="15" rx="2" fill="#6b8db5" fill-opacity="0.25"/>
    <!-- word 5: x=668, w=40 - match -->
    <rect x="668" y="102" width="40" height="15" rx="2" fill="#00a6ff" fill-opacity="0.28"/>
    <!-- word 6: x=716, w=52 - match -->
    <rect x="716" y="102" width="52" height="15" rx="2" fill="#00a6ff" fill-opacity="0.28"/>

    <!-- Alignment tick marks (thin rects between rows, y=69..100, h=31) - shifted +66px -->
    <!-- word 0 cx=401: match tick -->
    <rect x="400.4" y="69" width="1.2" height="31" fill="#00a6ff" opacity="0.70"/>
    <!-- word 1 cx=459: match tick -->
    <rect x="458.4" y="69" width="1.2" height="31" fill="#00a6ff" opacity="0.70"/>
    <!-- word 2 cx=514: edit tick dashed -->
    <rect x="513.5" y="69" width="1" height="6" fill="#6b8db5" opacity="0.55"/>
    <rect x="513.5" y="78" width="1" height="6" fill="#6b8db5" opacity="0.55"/>
    <rect x="513.5" y="87" width="1" height="6" fill="#6b8db5" opacity="0.55"/>
    <rect x="513.5" y="96" width="1" height="5" fill="#6b8db5" opacity="0.55"/>
    <!-- word 3 cx=572: match tick -->
    <rect x="571.4" y="69" width="1.2" height="31" fill="#00a6ff" opacity="0.70"/>
    <!-- word 4 cx=636: edit tick dashed -->
    <rect x="635.5" y="69" width="1" height="6" fill="#6b8db5" opacity="0.55"/>
    <rect x="635.5" y="78" width="1" height="6" fill="#6b8db5" opacity="0.55"/>
    <rect x="635.5" y="87" width="1" height="6" fill="#6b8db5" opacity="0.55"/>
    <rect x="635.5" y="96" width="1" height="5" fill="#6b8db5" opacity="0.55"/>
    <!-- word 5 cx=688: match tick -->
    <rect x="687.4" y="69" width="1.2" height="31" fill="#00a6ff" opacity="0.70"/>
    <!-- word 6 cx=742: match tick -->
    <rect x="741.4" y="69" width="1.2" height="31" fill="#00a6ff" opacity="0.70"/>

    <!-- Delta markers on edit words - shifted +66px -->
    <!-- word 2 delta: cx=514 -->
    <text x="514" y="99" class="fg-4" font-family="Segoe UI, Arial, sans-serif" font-size="8" text-anchor="middle" opacity="0.65">&#916;</text>
    <!-- word 4 delta: cx=636 -->
    <text x="636" y="99" class="fg-4" font-family="Segoe UI, Arial, sans-serif" font-size="8" text-anchor="middle" opacity="0.65">&#916;</text>

    <!-- Caption: shifted x to 380 to align with new row start -->
    <text x="380" y="135" class="fg-4" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-style="italic">alignment with 2 edits</text>

    <!-- Match legend right side (shifted +34px to clear the new row end at x=768) -->
    <text x="790" y="46" class="fg-4" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="600" letter-spacing="0.4">LEGEND</text>
    <!-- match swatch -->
    <rect x="790" y="54" width="16" height="10" rx="2" fill="#00a6ff" fill-opacity="0.28"/>
    <text x="812" y="63" class="fg-4" font-family="Segoe UI, Arial, sans-serif" font-size="8">match</text>
    <!-- edit swatch -->
    <rect x="790" y="70" width="16" height="10" rx="2" fill="#6b8db5" fill-opacity="0.25"/>
    <text x="812" y="79" class="fg-4" font-family="Segoe UI, Arial, sans-serif" font-size="8">edit (&#916;)</text>
    <!-- tick swatch (horizontal thin rect) -->
    <rect x="790" y="91" width="16" height="1.2" fill="#00a6ff" opacity="0.70"/>
    <text x="812" y="95" class="fg-4" font-family="Segoe UI, Arial, sans-serif" font-size="8">align</text>
    <!-- dashed tick swatch (3 small rects) -->
    <rect x="790" y="105" width="4" height="1" fill="#6b8db5" opacity="0.55"/>
    <rect x="796" y="105" width="4" height="1" fill="#6b8db5" opacity="0.55"/>
    <rect x="802" y="105" width="4" height="1" fill="#6b8db5" opacity="0.55"/>
    <text x="812" y="109" class="fg-4" font-family="Segoe UI, Arial, sans-serif" font-size="8">subst.</text>
  </g>

  <!-- RIGHT panel - score chip -->
  <g id="panel-right">
    <rect x="888" y="18" width="192" height="144" rx="6" ry="6" fill="#00a6ff" fill-opacity="0.04" stroke="#00a6ff" stroke-width="1"/>
    <rect x="888" y="18" width="192" height="5" fill="#00a6ff" opacity="0.7"/>

    <!-- Score chip -->
    <rect x="908" y="52" width="152" height="38" rx="19" fill="#00a6ff" fill-opacity="0.90"/>
    <text x="984" y="76" class="on-chip" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" text-anchor="middle">Score: 0.82</text>

    <!-- Continuous label -->
    <text x="984" y="108" class="fg-3" font-family="Segoe UI, Arial, sans-serif" font-size="9" text-anchor="middle">Continuous</text>

    <text x="984" y="124" class="fg-4" font-family="Segoe UI, Arial, sans-serif" font-size="8" text-anchor="middle">5 matches / 7 words</text>
    <text x="984" y="148" class="fg-4" font-family="Segoe UI, Arial, sans-serif" font-size="8" text-anchor="middle" font-style="italic">range [0..1]</text>
  </g>

</svg>
