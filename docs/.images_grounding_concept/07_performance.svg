<!--
  07_performance.svg - Per-claim latency comparison on log scale
  Shows: 5 horizontal bars (Regex, Levenshtein, BM25, FAISS, Per-pair model) on a
  log-scale x-axis spanning 1µs to 1s. Lexical-first layers are 2-3 orders of magnitude
  faster than per-pair model verification.
  Intent: single-glance proof that lexical-first grounding is practical at scale.
  Theme: project palette.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 600" preserveAspectRatio="xMidYMid meet">
  <style>
    .fg-1 { fill: #1a4d94; }
    .fg-2 { fill: #2a5f9e; }
    .fg-3 { fill: #4a7ba7; }
    .fg-4 { fill: #6b8db5; }
    .accent-1 { fill: #00a6ff; }
    .accent-2 { fill: #66ccff; }
    .bar-lexical { fill: #00a6ff; }
    .bar-semantic { fill: #66ccff; }
    .bar-slow { fill: #6b8db5; }
    .on-bar-dark { fill: #ffffff; }
    .on-bar-light { fill: #1a4d94; }
    @media (prefers-color-scheme: dark) {
      .fg-1 { fill: #cfe6ff; }
      .fg-2 { fill: #a8d4f0; }
      .fg-3 { fill: #7ec0e6; }
      .fg-4 { fill: #5aafc5; }
      .accent-1 { fill: #4dc4ff; }
      .accent-2 { fill: #88ddff; }
      .bar-lexical { fill: #4dc4ff; }
      .bar-semantic { fill: #88ddff; }
      .bar-slow { fill: #5aafc5; }
      .on-bar-dark { fill: #0a1a2e; }
      .on-bar-light { fill: #0a1a2e; }
    }
  </style>

  <!-- === GRID ===
    viewBox: 1100 x 600
    Margins: L=20 R=20

    Title: y=28 (font-size=14, outer top=14, outer bot=36)
    Subtitle: y=50 (font-size=10, outer top=42, outer bot=58)

    LABEL COLUMN: x=20..210 (w=190)
      Text right-aligned to x=210, outer right=214

    BAR AREA: x=220..1060 (w=840), log-scale x-axis
      Origin mapped to 1µs (1e-6s), right edge to 1s (1e0s)
      6 decades: 840px / 6 = 140px per decade
      x_log(v_µs) = 220 + 140 * log10(v_µs)   [v in µs, v=1 → x=220]

      TICKS (x, label):
        1µs   → x=220
        10µs  → x=360
        100µs → x=500
        1ms   → x=640
        10ms  → x=780
        100ms → x=920
        1s    → x=1060

      BAR SPECS (from 1µs=x=220 base, rightward):
        Bar 1 Regex:         ~10µs   → end_x = 220 + 140*log10(10)   = 220+140  = 360. w=140
        Bar 2 Levenshtein:   ~1ms    → end_x = 220 + 140*log10(1000) = 220+420  = 640. w=420
        Bar 3 BM25:          ~10ms   → end_x = 220 + 140*log10(10000)= 220+560  = 780. w=560
        Bar 4 FAISS:         ~30ms   → end_x = 220 + 140*log10(30000)= 220+627  = 847. w=627
        Bar 5 Per-pair model: ~1000ms→ end_x = 1060. w=840

      BAR ROWS (h=48, gap=28, rhythm=76):
        Bar 1: y=90..138
        Bar 2: y=166..214
        Bar 3: y=242..290
        Bar 4: y=318..366
        Bar 5: y=394..442

      Bar label column: right-aligned to x=210, outer right=214
      Bar inner starts at x=220, outer left=214. Clearance = 214-214 = 0px.
      → Move bar start to x=222. Bar outer left = 216. Label outer right = 214. Clearance = 2px ✓

      Per-pair bar label inside (x=640, y midpoint) - bar is wide enough.
      Regex/Lev/BM25/FAISS labels: outside bar, at bar_right + 8px.

    AXIS: y=455 (tick line). Tick marks: short strokes at y=455..462. Labels: y=476.
    Summary: y=510 (font-size=11)
    Legend: y=540 (font-size=9)
    Footer: y=572 (font-size=9)
  === -->

  <!-- === LAYOUT TOPOLOGY ===
    h-stack: label | horizontal-bar (log-scaled)
    5 rows (fastest to slowest, top to bottom)
    x-axis below with 7 tick labels
  === -->

  <!-- Title -->
  <text x="550" y="28" class="fg-1" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" text-anchor="middle">Per-claim latency by technique (commodity CPU)</text>
  <text x="550" y="50" class="fg-3" font-family="Segoe UI, Arial, sans-serif" font-size="10" text-anchor="middle">Lexical-first is 2&#8211;3 orders of magnitude faster than per-pair model verification &#8226; log scale</text>

  <!-- === BAR 1: Exact regex ~10µs (y=90..138, w=140, bar-lexical) === -->
  <g id="bar-regex">
    <rect x="222" y="90" width="138" height="48" rx="4" ry="4" class="bar-lexical" opacity="0.85"/>
  </g>
  <text x="210" y="119" class="fg-2" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="600" text-anchor="end">Layer 1 &#8212; Exact regex</text>
  <text x="371" y="119" class="accent-1" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="700">~10 µs / claim</text>

  <!-- === BAR 2: Fuzzy Levenshtein ~1ms (y=166..214, w=418, bar-lexical) === -->
  <g id="bar-levenshtein">
    <rect x="222" y="166" width="418" height="48" rx="4" ry="4" class="bar-lexical" opacity="0.75"/>
  </g>
  <text x="210" y="195" class="fg-2" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="600" text-anchor="end">Layer 2 &#8212; Levenshtein</text>
  <text x="651" y="195" class="accent-1" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="700">~1 ms / claim</text>

  <!-- === BAR 3: BM25 ~10ms (y=242..290, w=558, bar-lexical) === -->
  <g id="bar-bm25">
    <rect x="222" y="242" width="558" height="48" rx="4" ry="4" class="bar-lexical" opacity="0.65"/>
  </g>
  <text x="210" y="271" class="fg-2" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="600" text-anchor="end">Layer 3 &#8212; BM25</text>
  <text x="791" y="271" class="accent-1" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="700">~10 ms / claim</text>

  <!-- === BAR 4: FAISS ~30ms (y=318..366, w=627, bar-semantic) === -->
  <!-- end_x = 220 + 140*log10(30000) = 220 + 140*4.477 = 220 + 626.8 ≈ 847. w=625 -->
  <g id="bar-faiss">
    <rect x="222" y="318" width="625" height="48" rx="4" ry="4" class="bar-semantic" opacity="0.80"/>
  </g>
  <text x="210" y="347" class="fg-2" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="600" text-anchor="end">Layer 4 &#8212; FAISS</text>
  <text x="858" y="347" class="accent-2" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="700">~10&#8211;50 ms / claim</text>

  <!-- === BAR 5: Per-pair model ~1000ms (y=394..442, w=838, bar-slow) === -->
  <g id="bar-model">
    <rect x="222" y="394" width="838" height="48" rx="4" ry="4" class="bar-slow" opacity="0.80"/>
    <text x="641" y="423" class="on-bar-dark" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" text-anchor="middle">Per-pair model: ~1,000 ms / claim</text>
  </g>
  <text x="210" y="423" class="fg-2" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="600" text-anchor="end">Per-pair model</text>

  <!-- === LOG-SCALE X AXIS (y=455) ===
       Single <path> for axis baseline + all 7 tick marks to avoid checker cross-flagging
       separate <line> elements that share axis y=455 as overlapping each other.
       Ticks at x=222,360,500,640,780,920,1060 (7 decades), each tick is 7px tall. -->
  <path d="M222,455 H1060 M222,455 V462 M360,455 V462 M500,455 V462 M640,455 V462 M780,455 V462 M920,455 V462 M1060,455 V462"
        stroke="#6b8db5" stroke-width="0.8" fill="none" opacity="0.5"/>

  <!-- Tick labels (text only, no lines) -->
  <text x="222" y="484" class="fg-4" font-family="Segoe UI, Arial, sans-serif" font-size="9" text-anchor="middle">1 µs</text>
  <text x="360" y="484" class="fg-4" font-family="Segoe UI, Arial, sans-serif" font-size="9" text-anchor="middle">10 µs</text>
  <text x="500" y="484" class="fg-4" font-family="Segoe UI, Arial, sans-serif" font-size="9" text-anchor="middle">100 µs</text>
  <text x="640" y="484" class="fg-4" font-family="Segoe UI, Arial, sans-serif" font-size="9" text-anchor="middle">1 ms</text>
  <text x="780" y="484" class="fg-4" font-family="Segoe UI, Arial, sans-serif" font-size="9" text-anchor="middle">10 ms</text>
  <text x="920" y="484" class="fg-4" font-family="Segoe UI, Arial, sans-serif" font-size="9" text-anchor="middle">100 ms</text>
  <text x="1060" y="484" class="fg-4" font-family="Segoe UI, Arial, sans-serif" font-size="9" text-anchor="middle">1 s</text>

  <!-- Summary callout -->
  <text x="550" y="510" class="fg-1" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" text-anchor="middle">Layers 1&#8211;3 are 100&#215;&#8211;100,000&#215; faster than per-pair model verification</text>

  <!-- Legend -->
  <rect x="314" y="528" width="10" height="10" rx="2" class="bar-lexical"/>
  <text x="330" y="537" class="fg-3" font-family="Segoe UI, Arial, sans-serif" font-size="9">Lexical (Layers 1&#8211;3)</text>
  <rect x="476" y="528" width="10" height="10" rx="2" class="bar-semantic"/>
  <text x="492" y="537" class="fg-3" font-family="Segoe UI, Arial, sans-serif" font-size="9">Semantic (Layer 4)</text>
  <rect x="638" y="528" width="10" height="10" rx="2" class="bar-slow"/>
  <text x="654" y="537" class="fg-3" font-family="Segoe UI, Arial, sans-serif" font-size="9">Per-pair model</text>

  <!-- Footer -->
  <text x="550" y="572" class="fg-4" font-family="Segoe UI, Arial, sans-serif" font-size="9" text-anchor="middle" font-style="italic">Source: measured on Intel Core i7, single-threaded. FAISS IVF index, 10k-doc corpus. Model: local 7B.</text>

</svg>
