<!--
  18-failure-driven-development.svg - How the plugin was developed: failure-driven tool design
  Shows: 4 measured defect classes on the LEFT (overlap area, endpoint gap, contrast ratio,
         alignment drift) flowing through a manifold spine labelled "failure data analysis"
         out to 4 targeted tool responses on the RIGHT (routing engine, callout solver,
         WCAG checker, position primitives). The manifold itself is the visual argument:
         the plugin converges every failure class through measurement then forks out to a
         dedicated tool for each class.
  Intent: reader understands the plugin was shaped by measured defects, not intuition;
          every tool exists because a specific, quantified failure mode demanded it.
  Theme:  Stellars-Tech. fg-1 titles, fg-3 labels, accent-1 primary tool/defect, accent-2
          spine + metric badges. Inter sans-serif throughout.
-->

<!-- === GRID ===
  viewBox: 1000 x 420
  Outer margins: 30 left/right, top=0, bottom=10
  Title band: y=26 (17px/700 fg-1 centred x=500), y=46 (11px fg-3 centred)

  Horizontal topology (4 columns):
    defect-cards:  x=30..300   w=270
    left-gutter:   x=300..460  (start strands to merge)
    spine:         x=460..540  merge(460,207) -> fork(540,207)
    right-gutter:  x=540..700  (fork strands to tool-cards)
    tool-cards:    x=700..970  w=270

  Vertical rhythm (4 rows, identical for defect and tool columns):
    row-1: y=68..128   centre_y=99    strand-attach y=99
    row-2: y=140..200  centre_y=171   strand-attach y=171
    row-3: y=212..272  centre_y=243   strand-attach y=243
    row-4: y=284..344  centre_y=315   strand-attach y=315
    row gap: 12px, card h=60, accent-bar h=4 top

  Defect card internals (metric-forward):
    metric badge: rect x=40 y=card_y+10 w=70 h=40 rx=4 accent-2 tint
      metric value: centred at (75, card_y+28) 12px/700 accent-2
      metric unit:  centred at (75, card_y+42) 8px fg-3
    title: x=122 y=card_y+24 14px/700 fg-1
    desc : x=122 y=card_y+44 9px fg-3

  Tool card internals (target-forward):
    icon marker: circle cx=716 cy=card_y+30 r=10 accent-1 tint
      icon glyph: small shape inside (we use stylised asterisk/cross)
    title: x=740 y=card_y+26 14px/700 fg-1
    desc : x=740 y=card_y+44 9px fg-3

  Manifold anchor dots r=3.5 at (460,207) merge and (540,207) fork.
  Spine label "failure data analysis" centred at (500, 195) 9px/700 accent-2 italic.
  Sub-label "measured. classified. quantified." at (500, 224) 8px fg-3.

  Arrow tips land at x=699 on each tool-card at row-centre_y. Stems from x=689 so
  the arrow polygon clears the tool card left edge (x=700) by 1px.
=== -->

<!-- === LAYOUT TOPOLOGY ===
  h-split: defect-column (30..300) | manifold-zone (300..700) | tool-column (700..970)
  v-stack: title-band (0..60) | main-content (60..360) | caption-band (360..420)
  contain: each defect-card -> metric-badge, title, desc
  contain: each tool-card   -> icon-dot, title, desc
  connect: 4 defect-cards -> manifold(4->1 merge)->spine->manifold(1->4 fork) -> 4 tool-cards
  semantics:
    accent-1 (teal #005f7a) = primary tool/defect stroke
    accent-2 (amber #7a4a15) = metric values + spine + anchor nodes
  flow: left-to-right; measurement converges on spine, responses diverge to tools
=== -->

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 420">
  <style>
    text { font-family: 'Inter', 'Segoe UI', Helvetica, Arial, sans-serif; }
    .fg-1 { fill: #1a5a6e; }
    .fg-3 { fill: #236a74; }
    .accent-1 { fill: #005f7a; }
    .accent-2 { fill: #7a4a15; }

    .defect-fill   { fill: #005f7a; fill-opacity: 0.05; }
    .defect-stroke { fill: none; stroke: #005f7a; stroke-width: 1; }
    .defect-bar    { fill: #005f7a; opacity: 0.6; }

    .tool-fill   { fill: #005f7a; fill-opacity: 0.05; }
    .tool-stroke { fill: none; stroke: #005f7a; stroke-width: 1; }
    .tool-bar    { fill: #005f7a; opacity: 0.6; }

    .metric-fill   { fill: #7a4a15; fill-opacity: 0.08; }
    .metric-stroke { fill: none; stroke: #7a4a15; stroke-width: 0.8; opacity: 0.6; }

    .icon-fill   { fill: #005f7a; fill-opacity: 0.12; }
    .icon-stroke { fill: none; stroke: #005f7a; stroke-width: 1; }
    .icon-glyph  { fill: none; stroke: #005f7a; stroke-width: 1.4; stroke-linecap: round; stroke-linejoin: round; }

    .card-title { font-size: 13px; font-weight: 700; }
    .card-desc  { font-size: 9px; }
    .metric-val { font-size: 13px; font-weight: 700; }
    .metric-unit { font-size: 8px; }

    .manifold-strand { fill: none; stroke: #005f7a; stroke-width: 1.4; stroke-linejoin: round; stroke-linecap: round; opacity: 0.85; }
    .manifold-arrow  { fill: #005f7a; stroke: none; opacity: 0.9; }

    .caption { font-size: 10px; font-style: italic; }

    @media (prefers-color-scheme: dark) {
      .fg-1 { fill: #b8e4f0; }
      .fg-3 { fill: #5aafc5; }
      .accent-1 { fill: #5cc8e0; }
      .accent-2 { fill: #d4a04a; }

      .defect-fill   { fill: #5cc8e0; fill-opacity: 0.08; }
      .defect-stroke { stroke: #5cc8e0; }
      .defect-bar    { fill: #5cc8e0; }

      .tool-fill   { fill: #5cc8e0; fill-opacity: 0.08; }
      .tool-stroke { stroke: #5cc8e0; }
      .tool-bar    { fill: #5cc8e0; }

      .metric-fill   { fill: #d4a04a; fill-opacity: 0.12; }
      .metric-stroke { stroke: #d4a04a; }

      .icon-fill   { fill: #5cc8e0; fill-opacity: 0.14; }
      .icon-stroke { stroke: #5cc8e0; }
      .icon-glyph  { stroke: #5cc8e0; }

      .manifold-strand { stroke: #5cc8e0; }
      .manifold-arrow  { fill: #5cc8e0; }
    }
  </style>

  <!-- Background -->
  <rect x="0" y="0" width="1000" height="420" fill="transparent"/>

  <!-- Title -->
  <text class="fg-1" x="500" y="26" text-anchor="middle" font-size="17" font-weight="700">how it was developed</text>
  <text class="fg-3" x="500" y="46" text-anchor="middle" font-size="11">every tool exists because a specific, measured failure class demanded it</text>

  <!-- ============================================================ -->
  <!-- DEFECT CARDS (LEFT COLUMN): x=30..300                         -->
  <!-- ============================================================ -->
  <g id="defect-cards">
    <!-- Defect 1: overlap 127px -->
    <g id="defect-1">
      <rect class="defect-fill"   x="30" y="68" width="270" height="60" rx="4"/>
      <rect class="defect-stroke" x="30" y="68" width="270" height="60" rx="4"/>
      <rect class="defect-bar"    x="30" y="68" width="270" height="4" rx="4"/>
      <rect class="metric-fill"   x="40" y="80" width="72" height="40" rx="3"/>
      <rect class="metric-stroke" x="40" y="80" width="72" height="40" rx="3"/>
      <text class="accent-2 metric-val"  x="76" y="100" text-anchor="middle">127</text>
      <text class="fg-3 metric-unit"     x="76" y="114" text-anchor="middle">px overlap</text>
      <text class="fg-1 card-title"      x="122" y="93">text/shape overlap</text>
      <text class="fg-3 card-desc"       x="122" y="109">label sits on card edge,</text>
      <text class="fg-3 card-desc"       x="122" y="121">measured as pixel area</text>
    </g>

    <!-- Defect 2: endpoint gap 11px -->
    <g id="defect-2">
      <rect class="defect-fill"   x="30" y="140" width="270" height="60" rx="4"/>
      <rect class="defect-stroke" x="30" y="140" width="270" height="60" rx="4"/>
      <rect class="defect-bar"    x="30" y="140" width="270" height="4" rx="4"/>
      <rect class="metric-fill"   x="40" y="152" width="72" height="40" rx="3"/>
      <rect class="metric-stroke" x="40" y="152" width="72" height="40" rx="3"/>
      <text class="accent-2 metric-val"  x="76" y="172" text-anchor="middle">11</text>
      <text class="fg-3 metric-unit"     x="76" y="186" text-anchor="middle">px gap</text>
      <text class="fg-1 card-title"      x="122" y="165">endpoint gap</text>
      <text class="fg-3 card-desc"       x="122" y="181">arrow misses target,</text>
      <text class="fg-3 card-desc"       x="122" y="193">residual distance in px</text>
    </g>

    <!-- Defect 3: contrast ratio 2.1:1 -->
    <g id="defect-3">
      <rect class="defect-fill"   x="30" y="212" width="270" height="60" rx="4"/>
      <rect class="defect-stroke" x="30" y="212" width="270" height="60" rx="4"/>
      <rect class="defect-bar"    x="30" y="212" width="270" height="4" rx="4"/>
      <rect class="metric-fill"   x="40" y="224" width="72" height="40" rx="3"/>
      <rect class="metric-stroke" x="40" y="224" width="72" height="40" rx="3"/>
      <text class="accent-2 metric-val"  x="76" y="244" text-anchor="middle">2.1:1</text>
      <text class="fg-3 metric-unit"     x="76" y="258" text-anchor="middle">contrast</text>
      <text class="fg-1 card-title"      x="122" y="237">contrast failure</text>
      <text class="fg-3 card-desc"       x="122" y="253">text below WCAG AA,</text>
      <text class="fg-3 card-desc"       x="122" y="265">ratio vs background</text>
    </g>

    <!-- Defect 4: alignment drift 15-30px -->
    <g id="defect-4">
      <rect class="defect-fill"   x="30" y="284" width="270" height="60" rx="4"/>
      <rect class="defect-stroke" x="30" y="284" width="270" height="60" rx="4"/>
      <rect class="defect-bar"    x="30" y="284" width="270" height="4" rx="4"/>
      <rect class="metric-fill"   x="40" y="296" width="72" height="40" rx="3"/>
      <rect class="metric-stroke" x="40" y="296" width="72" height="40" rx="3"/>
      <text class="accent-2 metric-val"  x="76" y="316" text-anchor="middle">15-30</text>
      <text class="fg-3 metric-unit"     x="76" y="330" text-anchor="middle">px drift</text>
      <text class="fg-1 card-title"      x="122" y="309">alignment drift</text>
      <text class="fg-3 card-desc"       x="122" y="325">cards off the grid,</text>
      <text class="fg-3 card-desc"       x="122" y="337">deviation per element</text>
    </g>
  </g>

  <!-- ============================================================ -->
  <!-- MANIFOLD CONNECTOR: 4 defects -> spine -> 4 tools             -->
  <!--   starts @ (300, 99/171/243/315)                              -->
  <!--   merge  @ (460, 207)                                         -->
  <!--   fork   @ (540, 207)                                         -->
  <!--   ends   @ (700, 99/171/243/315)  (arrow tip x=699)           -->
  <!-- ============================================================ -->
  <g id="manifold">
    <!-- start strands: defect-card right edge -> spine merge                    -->
    <!-- T-junction middle detection drops chamfer on rows 2 and 3 (middle       -->
    <!-- of the vertical merge trunk at x=460); rows 1 and 4 (extremes) keep     -->
    <!-- chamfer because they are the caps of the trunk.                         -->
    <path class="manifold-strand" d="M311,99 L452,99 L460,107 L460,207"/>
    <path class="manifold-strand" d="M311,171 L460,171 L460,207"/>
    <path class="manifold-strand" d="M311,243 L460,243 L460,207"/>
    <path class="manifold-strand" d="M311,315 L452,315 L460,307 L460,207"/>

    <!-- spine: merge -> fork (shared trunk, same class as strands) -->
    <path class="manifold-strand" d="M460,207 L540,207"/>

    <!-- end strands: fork -> tool-card left edge (arrow tip @ x=699)            -->
    <!-- Middle rows 2, 3 drop chamfer for the same T-junction reason.           -->
    <path class="manifold-strand" d="M540,207 L540,107 L548,99 L689,99"/>
    <polygon class="manifold-arrow" points="699,99 689,94 689,104"/>
    <path class="manifold-strand" d="M540,207 L540,171 L689,171"/>
    <polygon class="manifold-arrow" points="699,171 689,166 689,176"/>
    <path class="manifold-strand" d="M540,207 L540,243 L689,243"/>
    <polygon class="manifold-arrow" points="699,243 689,238 689,248"/>
    <path class="manifold-strand" d="M540,207 L540,307 L548,315 L689,315"/>
    <polygon class="manifold-arrow" points="699,315 689,310 689,320"/>
  </g>

  <!-- ============================================================ -->
  <!-- TOOL CARDS (RIGHT COLUMN): x=700..970                         -->
  <!-- ============================================================ -->
  <g id="tool-cards">
    <!-- Tool 1: routing engine -->
    <g id="tool-1">
      <rect class="tool-fill"   x="700" y="68" width="270" height="60" rx="4"/>
      <rect class="tool-stroke" x="700" y="68" width="270" height="60" rx="4"/>
      <rect class="tool-bar"    x="700" y="68" width="270" height="4" rx="4"/>
      <circle class="icon-fill"   cx="722" cy="99" r="13"/>
      <circle class="icon-stroke" cx="722" cy="99" r="13"/>
      <!-- routing glyph: elbow arrow -->
      <path class="icon-glyph" d="M715,103 L715,97 L720,97 L720,101 L729,101"/>
      <polygon class="accent-1" points="730,101 727,99.5 727,102.5"/>
      <text class="fg-1 card-title" x="742" y="93">routing engine</text>
      <text class="fg-3 card-desc"  x="742" y="109">L-chamfered paths, edge-snap,</text>
      <text class="fg-3 card-desc"  x="742" y="121">standoff: closes endpoint gaps</text>
    </g>

    <!-- Tool 2: callout solver -->
    <g id="tool-2">
      <rect class="tool-fill"   x="700" y="140" width="270" height="60" rx="4"/>
      <rect class="tool-stroke" x="700" y="140" width="270" height="60" rx="4"/>
      <rect class="tool-bar"    x="700" y="140" width="270" height="4" rx="4"/>
      <circle class="icon-fill"   cx="722" cy="171" r="13"/>
      <circle class="icon-stroke" cx="722" cy="171" r="13"/>
      <!-- callout glyph: speech-bubble leader -->
      <rect x="715" y="166" width="11" height="7" rx="1.5" fill="none" stroke="#005f7a" stroke-width="1.2" class="icon-glyph"/>
      <path class="icon-glyph" d="M720,173 L722,177 L724,173"/>
      <text class="fg-1 card-title" x="742" y="165">callout solver</text>
      <text class="fg-3 card-desc"  x="742" y="181">empty-space + joint placement:</text>
      <text class="fg-3 card-desc"  x="742" y="193">eliminates label overlap</text>
    </g>

    <!-- Tool 3: WCAG checker -->
    <g id="tool-3">
      <rect class="tool-fill"   x="700" y="212" width="270" height="60" rx="4"/>
      <rect class="tool-stroke" x="700" y="212" width="270" height="60" rx="4"/>
      <rect class="tool-bar"    x="700" y="212" width="270" height="4" rx="4"/>
      <circle class="icon-fill"   cx="722" cy="243" r="13"/>
      <circle class="icon-stroke" cx="722" cy="243" r="13"/>
      <!-- WCAG glyph: two-tone split circle -->
      <path d="M722,232 A11,11 0 0,1 722,254 Z" fill="#005f7a" opacity="0.55"/>
      <circle cx="722" cy="243" r="11" fill="none" stroke="#005f7a" stroke-width="1.2" class="icon-glyph"/>
      <text class="fg-1 card-title" x="742" y="237">WCAG checker</text>
      <text class="fg-3 card-desc"  x="742" y="253">text + object contrast ratio:</text>
      <text class="fg-3 card-desc"  x="742" y="265">enforces WCAG AA in both modes</text>
    </g>

    <!-- Tool 4: position primitives -->
    <g id="tool-4">
      <rect class="tool-fill"   x="700" y="284" width="270" height="60" rx="4"/>
      <rect class="tool-stroke" x="700" y="284" width="270" height="60" rx="4"/>
      <rect class="tool-bar"    x="700" y="284" width="270" height="4" rx="4"/>
      <circle class="icon-fill"   cx="722" cy="315" r="13"/>
      <circle class="icon-stroke" cx="722" cy="315" r="13"/>
      <!-- grid glyph: 3x3 dots -->
      <g fill="#005f7a">
        <circle cx="717" cy="310" r="1.3"/><circle cx="722" cy="310" r="1.3"/><circle cx="727" cy="310" r="1.3"/>
        <circle cx="717" cy="315" r="1.3"/><circle cx="722" cy="315" r="1.3"/><circle cx="727" cy="315" r="1.3"/>
        <circle cx="717" cy="320" r="1.3"/><circle cx="722" cy="320" r="1.3"/><circle cx="727" cy="320" r="1.3"/>
      </g>
      <text class="fg-1 card-title" x="742" y="309">position primitives</text>
      <text class="fg-3 card-desc"  x="742" y="325">computed anchors + rect/hex/arc:</text>
      <text class="fg-3 card-desc"  x="742" y="337">eliminates grid drift</text>
    </g>
  </g>

  <!-- Caption band -->
  <g id="caption">
    <text class="fg-3 caption" x="500" y="390" text-anchor="middle">failure data in, targeted tool out - each tool eliminates one measured defect class</text>
  </g>

</svg>
