  <style>
    .fg-1 { fill: #1a5a6e; } .fg-3 { fill: #236a74; } .fg-4 { fill: #2b7680; }
    .card-fill { fill: #005f7a; fill-opacity: 0.02; }
    .card-stroke { fill: none; stroke: #005f7a; stroke-width: 0.8; opacity: 0.35; }
    .card-bar { fill: #005f7a; opacity: 0.35; }
    .shape-a-thin { fill: none; stroke: #005f7a; stroke-width: 1.6; stroke-linejoin: round; stroke-linecap: round; }
    .shape-a-fillsolid { fill: #005f7a; stroke: none; }
    .shape-a-ghost { fill: none; stroke: #005f7a; stroke-width: 0.9; stroke-linejoin: round; }
    .shape-b-thin { fill: none; stroke: #7a4a15; stroke-width: 1.6; stroke-linejoin: round; stroke-linecap: round; }
    .shape-b-fillsolid { fill: #7a4a15; stroke: none; }
    .shape-b-ghost { fill: none; stroke: #7a4a15; stroke-width: 0.9; stroke-linejoin: round; }
    .title-main { font-family: Segoe UI, Arial, sans-serif; font-size: 16px; font-weight: 700; fill: #1a5a6e; }
    .title-sub { font-family: Segoe UI, Arial, sans-serif; font-size: 10px; fill: #236a74; }
    .cell-label { font-family: Segoe UI, Arial, sans-serif; font-size: 11px; font-weight: 700; fill: #1a5a6e; }
    .cell-param { font-family: Consolas, Menlo, monospace; font-size: 8px; fill: #2b7680; }
    @media (prefers-color-scheme: dark) {
      .fg-1 { fill: #b8e4f0; } .fg-3 { fill: #5aafc5; } .fg-4 { fill: #4099b3; }
      .card-fill { fill: #5cc8e0; fill-opacity: 0.04; }
      .card-stroke { stroke: #5cc8e0; opacity: 0.45; }
      .card-bar { fill: #5cc8e0; opacity: 0.45; }
      .shape-a-thin, .shape-a-ghost { stroke: #5cc8e0; }
      .shape-a-fillsolid { fill: #5cc8e0; }
      .shape-b-thin, .shape-b-ghost { stroke: #d4a04a; }
      .shape-b-fillsolid { fill: #d4a04a; }
      .title-main, .cell-label { fill: #b8e4f0; }
      .title-sub { fill: #5aafc5; }
      .cell-param { fill: #4099b3; }
    }
  </style>
