    <polygon points="602.0,92.0 576.0,137.03 524.0,137.03 498.0,92.0 524.0,46.97 576.0,46.97" class="hex-teal-3-fill"/>
    <polygon points="602.0,182.07 576.0,227.1 524.0,227.1 498.0,182.07 524.0,137.04 576.0,137.04" class="hex-teal-1-fill"/>
    <polygon points="602.0,272.13 576.0,317.16 524.0,317.16 498.0,272.13 524.0,227.1 576.0,227.1" class="hex-teal-3-stroke"/>
    <polygon points="680.0,137.03 654.0,182.06 602.0,182.06 576.0,137.03 602.0,92.0 654.0,92.0" class="hex-teal-3-fill"/>
    <polygon points="680.0,227.1 654.0,272.13 602.0,272.13 576.0,227.1 602.0,182.07 654.0,182.07" class="hex-teal-2-fill"/>
