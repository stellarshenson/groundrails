<!--
  12-honeycomb.svg - Decorative honeycomb mosaic of 14 shape primitives
  Shows: ~28 flat-top hexagons packed across a widescreen canvas. Each cell
         holds a small geometric motif (dot, ring, triangle, plus, star, diamond,
         chevron, concentric rings, dot cluster, slash, cross, square, arrow, grid).
         Shades vary across six teal grades and three ochre grades; some cells filled,
         some stroked-only for breathing room.
  Intent: section-break / visual breather hinting at composability - many primitives
          from one tool, organic yet mathematical.
  Theme: stellars-tech teal + ochre accent, full prefers-color-scheme dark overrides.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 380">
  <style>
    .hex-teal-1-fill   { fill: #00475c; fill-opacity: 0.22; stroke: #00475c; stroke-width: 1; }
    .hex-teal-1-stroke { fill: none; stroke: #00475c; stroke-width: 1.2; opacity: 0.55; }
    .hex-teal-2-fill   { fill: #005f7a; fill-opacity: 0.22; stroke: #005f7a; stroke-width: 1; }
    .hex-teal-2-stroke { fill: none; stroke: #005f7a; stroke-width: 1.2; opacity: 0.55; }
    .hex-teal-3-fill   { fill: #1a7590; fill-opacity: 0.22; stroke: #1a7590; stroke-width: 1; }
    .hex-teal-3-stroke { fill: none; stroke: #1a7590; stroke-width: 1.2; opacity: 0.55; }
    .hex-teal-4-fill   { fill: #2b8aa3; fill-opacity: 0.22; stroke: #2b8aa3; stroke-width: 1; }
    .hex-teal-4-stroke { fill: none; stroke: #2b8aa3; stroke-width: 1.2; opacity: 0.55; }
    .hex-teal-5-fill   { fill: #3ca0b7; fill-opacity: 0.22; stroke: #3ca0b7; stroke-width: 1; }
    .hex-teal-5-stroke { fill: none; stroke: #3ca0b7; stroke-width: 1.2; opacity: 0.55; }
    .hex-teal-6-fill   { fill: #4db5cb; fill-opacity: 0.22; stroke: #4db5cb; stroke-width: 1; }
    .hex-teal-6-stroke { fill: none; stroke: #4db5cb; stroke-width: 1.2; opacity: 0.55; }
    .hex-ochre-1-fill   { fill: #5e360d; fill-opacity: 0.26; stroke: #5e360d; stroke-width: 1; }
    .hex-ochre-1-stroke { fill: none; stroke: #5e360d; stroke-width: 1.2; opacity: 0.65; }
    .hex-ochre-2-fill   { fill: #7a4a15; fill-opacity: 0.26; stroke: #7a4a15; stroke-width: 1; }
    .hex-ochre-2-stroke { fill: none; stroke: #7a4a15; stroke-width: 1.2; opacity: 0.65; }
    .hex-ochre-3-fill   { fill: #9a6020; fill-opacity: 0.26; stroke: #9a6020; stroke-width: 1; }
    .hex-ochre-3-stroke { fill: none; stroke: #9a6020; stroke-width: 1.2; opacity: 0.65; }
    .motif         { fill: #1a5a6e; stroke: none; }
    .motif-stroke  { fill: none; stroke: #1a5a6e; stroke-width: 1.1; stroke-linejoin: round; stroke-linecap: round; }
    .motif-line    { fill: none; stroke: #1a5a6e; stroke-width: 1.1; stroke-linecap: round; }
    .motif-line-bold { fill: none; stroke: #1a5a6e; stroke-width: 1.6; stroke-linecap: round; }
    @media (prefers-color-scheme: dark) {
      .hex-teal-1-fill   { fill: #2d7e94; fill-opacity: 0.26; stroke: #2d7e94; }
      .hex-teal-1-stroke { stroke: #2d7e94; opacity: 0.60; }
      .hex-teal-2-fill   { fill: #3d92a8; fill-opacity: 0.26; stroke: #3d92a8; }
      .hex-teal-2-stroke { stroke: #3d92a8; opacity: 0.60; }
      .hex-teal-3-fill   { fill: #4da6ba; fill-opacity: 0.26; stroke: #4da6ba; }
      .hex-teal-3-stroke { stroke: #4da6ba; opacity: 0.60; }
      .hex-teal-4-fill   { fill: #5cbacc; fill-opacity: 0.26; stroke: #5cbacc; }
      .hex-teal-4-stroke { stroke: #5cbacc; opacity: 0.60; }
      .hex-teal-5-fill   { fill: #6cced8; fill-opacity: 0.26; stroke: #6cced8; }
      .hex-teal-5-stroke { stroke: #6cced8; opacity: 0.60; }
      .hex-teal-6-fill   { fill: #9edfe8; fill-opacity: 0.26; stroke: #9edfe8; }
      .hex-teal-6-stroke { stroke: #9edfe8; opacity: 0.60; }
      .hex-ochre-1-fill   { fill: #c89548; fill-opacity: 0.30; stroke: #c89548; }
      .hex-ochre-1-stroke { stroke: #c89548; opacity: 0.70; }
      .hex-ochre-2-fill   { fill: #d4a04a; fill-opacity: 0.30; stroke: #d4a04a; }
      .hex-ochre-2-stroke { stroke: #d4a04a; opacity: 0.70; }
      .hex-ochre-3-fill   { fill: #e0b05a; fill-opacity: 0.30; stroke: #e0b05a; }
      .hex-ochre-3-stroke { stroke: #e0b05a; opacity: 0.70; }
      .motif         { fill: #b8e4f0; }
      .motif-stroke  { stroke: #b8e4f0; }
      .motif-line    { stroke: #b8e4f0; }
      .motif-line-bold { stroke: #b8e4f0; }
    }
  </style>

  <!-- === GRID REFERENCE ===
    viewBox: 1000x380
    Margin: x=30, y=40
    Hex circumradius R=52; flat-top packing
    Horizontal pitch (column): 1.5*R = 78.0
    Vertical pitch (row):      sqrt(3)*R ≈ 90.07
    Odd columns offset by v_pitch/2 ≈ 45.03
    Placed: 28 hexagons across columns x rows
    Palette: 6 teal shades, 3 ochre shades; ~20% stroke-only, ~15% empty
  === -->

  <!-- === LAYOUT TOPOLOGY ===
    h-spacing: columns equally spaced by 78.0
    v-spacing: rows equally spaced by 90.07 within column
    mirror: offset pattern repeats across alternating columns (offset half v_pitch)
    contain: nodes layer holds hexes; content layer holds motifs inside hexes
  === -->

