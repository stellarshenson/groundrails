<!--
  14-container-routing.svg - Showcase of the container-scoped auto-router.
  Shows: two rounded cards on a bg-plate. card-A holds a src rect, a tgt rect, and
         four obstacles. A multi-elbow A* auto-route threads from src to tgt around
         all obstacles, clipped to card-A's interior via container_id. card-B holds
         a dst rect; a simple 1-bend card-edge L connects card-A to dst as a
         secondary example of the plain auto-edge pattern.
  Intent: didactic - teaches the three layers of the routing stack: full-canvas
         bg-plate auto-skipped, container_id clips to a closed shape, multi-elbow
         A* with turn penalty produces clean multi-elbow paths. Placed after
         11-connector-modes in the article as an advanced pattern.
  Theme: Stellars-Tech. fg-1 title, fg-3 labels, accent-1 card plates and primary
         connector, accent-2 for obstacles / tgt / dst. Inter sans-serif throughout.
-->
<!-- add-life: medium
  colour: card-A sky-teal, card-B blue-teal; 4 obstacles in amber/ochre family (copper, amber-ochre, ochre, deep-ochre)
  shapes: corner brackets on both cards + on obstacles, scan-line under card titles, tech bracket marks
  icons: lucide - card-A box (container), card-B package (destination), src play, tgt target, dst flag
  embroidery: circuit/PCB faded traces with node dots in background (matches wire-routing theme)
  abstract: 12 scattered accent particles in whitespace, 2 background sweep arcs
  bg texture: circuit/PCB traces at 0.07-0.09 opacity (HARD CAP 0.10)
  glow: cyan stdDev=2 on title, stdDev=1.5 on card titles, warm stdDev=1.6 on primary connector
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 540">
  <style>
    text { font-family: 'Inter', 'Segoe UI', Helvetica, Arial, sans-serif; }
    .bg-plate { fill: none; }
    .fg-1 { fill: #1a5a6e; }
    .fg-2 { fill: #24697e; }
    .fg-3 { fill: #236a74; }

    .card { fill: #005f7a; fill-opacity: 0.05; stroke: #005f7a; stroke-width: 1.2; }
    .card-title { font: 600 12px 'Inter', sans-serif; fill: #1a5a6e; }

    .src { fill: #0096d1; fill-opacity: 0.22; stroke: #0096d1; stroke-width: 1.4; }
    .dst { fill: #da8230; fill-opacity: 0.25; stroke: #da8230; stroke-width: 1.4; }
    .obstacle { fill: #d4a04a; fill-opacity: 0.30; stroke: #b8541a; stroke-width: 1.0; }

    .node-label { font: 10px 'Inter', sans-serif; fill: #1a5a6e; text-anchor: middle; }
    .obs-label { font: 9px 'Inter', sans-serif; fill: #7a4a15; text-anchor: middle; }

    .route-auto { fill: none; stroke: #005f7a; stroke-width: 2.0; stroke-linejoin: round; stroke-linecap: round; }
    .route-auto-head { fill: #005f7a; }
    .route-edge { fill: none; stroke: #b8541a; stroke-width: 1.6; stroke-linejoin: round; stroke-linecap: round; stroke-dasharray: 5 3; }
    .route-edge-head { fill: #b8541a; }

    .annot { font: 10px 'Inter', sans-serif; fill: #24697e; }
    .annot-bold { font: 600 10px 'Inter', sans-serif; fill: #1a5a6e; }

    @media (prefers-color-scheme: dark) {
      .bg-plate { fill: none; }
      .fg-1 { fill: #b8e4f0; }
      .fg-2 { fill: #8fd4e6; }
      .fg-3 { fill: #5aafc5; }
      .card { fill: #5cc8e0; fill-opacity: 0.06; stroke: #5cc8e0; }
      .card-title { fill: #b8e4f0; }
      .src { fill: #5cc8e0; fill-opacity: 0.28; stroke: #5cc8e0; }
      .dst { fill: #e49648; fill-opacity: 0.30; stroke: #e49648; }
      .obstacle { fill: #d4a04a; fill-opacity: 0.32; stroke: #f0a864; }
      .node-label { fill: #0a1a24; }
      .obs-label { fill: #0a1a24; }
      .route-auto { stroke: #5cc8e0; }
      .route-auto-head { fill: #5cc8e0; }
      .route-edge { stroke: #e49648; }
      .route-edge-head { fill: #e49648; }
      .annot { fill: #8fd4e6; }
      .annot-bold { fill: #b8e4f0; }
    }

    /* add-life add-ons */
    .corner-bracket { fill: none; stroke: #0096d1; stroke-width: 0.9; opacity: 0.55; stroke-linecap: round; }
    .obs-bracket    { fill: none; stroke: #da8230; stroke-width: 0.7; opacity: 0.55; stroke-linecap: round; }
    .scan-line      { fill: none; stroke: #0096d1; stroke-width: 0.4; opacity: 0.28; stroke-dasharray: 3 2; }
    .bg-circuit     { fill: none; stroke: #0096d1; stroke-width: 0.55; opacity: 0.08; }
    .bg-circuit-node { fill: #0096d1; opacity: 0.11; }
    .bg-arc         { fill: none; stroke: #0096d1; stroke-width: 0.5; opacity: 0.12; }
    .particle-cool  { fill: #0096d1; opacity: 0.30; }
    .particle-warm  { fill: #da8230; opacity: 0.30; }
    .node-icon-cool { fill: none; stroke: #0096d1; stroke-width: 1.4; stroke-linecap: round; stroke-linejoin: round; opacity: 0.60; }
    .node-icon-warm { fill: none; stroke: #da8230; stroke-width: 1.4; stroke-linecap: round; stroke-linejoin: round; opacity: 0.65; }
    .card-icon      { fill: none; stroke: #0096d1; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; opacity: 0.55; }

    /* per-card in-family hue variants */
    .card-A { fill: #008bb8; fill-opacity: 0.055; stroke: #008bb8; stroke-width: 1.2; }
    .card-B { fill: #0582b5; fill-opacity: 0.055; stroke: #0582b5; stroke-width: 1.2; }

    /* per-obstacle in-family amber/ochre hue variants */
    .obs-1 { fill: #c8a464; fill-opacity: 0.30; stroke: #a3620f; stroke-width: 1.0; }
    .obs-2 { fill: #d4a04a; fill-opacity: 0.30; stroke: #b8541a; stroke-width: 1.0; }
    .obs-3 { fill: #b87c30; fill-opacity: 0.30; stroke: #8a4812; stroke-width: 1.0; }
    .obs-4 { fill: #c8883a; fill-opacity: 0.30; stroke: #9a501b; stroke-width: 1.0; }

    @media (prefers-color-scheme: dark) {
      .corner-bracket { stroke: #5cc8e0; }
      .obs-bracket    { stroke: #d4a04a; }
      .scan-line      { stroke: #5cc8e0; }
      .bg-circuit     { stroke: #5cc8e0; opacity: 0.10; }
      .bg-circuit-node { fill: #5cc8e0; opacity: 0.15; }
      .bg-arc         { stroke: #5cc8e0; opacity: 0.15; }
      .particle-cool  { fill: #5cc8e0; opacity: 0.35; }
      .particle-warm  { fill: #d4a04a; opacity: 0.35; }
      .node-icon-cool { stroke: #5cc8e0; }
      .node-icon-warm { stroke: #d4a04a; }
      .card-icon      { stroke: #5cc8e0; }
      .card-A { fill: #4ab6cf; fill-opacity: 0.08; stroke: #4ab6cf; }
      .card-B { fill: #48b8cf; fill-opacity: 0.08; stroke: #48b8cf; }
      .obs-1  { fill: #e4b862; fill-opacity: 0.32; stroke: #e4b862; }
      .obs-2  { fill: #d4a04a; fill-opacity: 0.32; stroke: #f0a864; }
      .obs-3  { fill: #c89648; fill-opacity: 0.32; stroke: #c89648; }
      .obs-4  { fill: #d8a452; fill-opacity: 0.32; stroke: #d8a452; }
    }
  </style>

  <defs>
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-label" x="-20%" y="-20%" width="140%" height="140%" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-route" x="-10%" y="-10%" width="120%" height="120%" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="1.6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect class="bg-plate" width="1000" height="540"/>

  <g id="add-life-decorations">
    <!-- Circuit/PCB trace texture (matches wire-routing theme) -->
    <g id="add-life-bg-texture">
      <path d="M8,12 H40 V34 H90 V16 H148" class="bg-circuit"/>
      <path d="M860,14 H908 V38 H952 V18 H992" class="bg-circuit"/>
      <path d="M6,528 H60 V506 H112 V530 H172" class="bg-circuit"/>
      <path d="M830,530 H880 V506 H932 V528 H992" class="bg-circuit"/>
      <path d="M498,8 V34 H440" class="bg-circuit"/>
      <path d="M502,8 V34 H575" class="bg-circuit"/>
      <path d="M498,500 V516 H440" class="bg-circuit"/>
      <path d="M502,500 V516 H575" class="bg-circuit"/>
      <circle cx="40" cy="34" r="1.2" class="bg-circuit-node"/>
      <circle cx="90" cy="16" r="1.2" class="bg-circuit-node"/>
      <circle cx="908" cy="38" r="1.2" class="bg-circuit-node"/>
      <circle cx="952" cy="18" r="1.2" class="bg-circuit-node"/>
      <circle cx="60" cy="506" r="1.2" class="bg-circuit-node"/>
      <circle cx="112" cy="530" r="1.2" class="bg-circuit-node"/>
      <circle cx="880" cy="506" r="1.2" class="bg-circuit-node"/>
      <circle cx="932" cy="528" r="1.2" class="bg-circuit-node"/>
      <circle cx="498" cy="34" r="1.2" class="bg-circuit-node"/>
      <circle cx="502" cy="34" r="1.2" class="bg-circuit-node"/>
      <circle cx="440" cy="516" r="1.2" class="bg-circuit-node"/>
      <circle cx="575" cy="516" r="1.2" class="bg-circuit-node"/>
    </g>

    <!-- Background sweep arcs -->
    <g id="add-life-bg-arcs">
      <path d="M-40,16 Q500,-12 1040,18" class="bg-arc"/>
      <path d="M-40,530 Q500,558 1040,528" class="bg-arc"/>
    </g>

    <!-- Corner brackets on card-A (x=50..490, y=90..470) -->
    <g id="add-life-card-brackets">
      <path d="M53,98 L53,92 L59,92" class="corner-bracket"/>
      <path d="M487,98 L487,92 L481,92" class="corner-bracket"/>
      <path d="M53,462 L53,468 L59,468" class="corner-bracket"/>
      <path d="M487,462 L487,468 L481,468" class="corner-bracket"/>
      <!-- Corner brackets on card-B (x=530..950, y=90..470) -->
      <path d="M533,98 L533,92 L539,92" class="corner-bracket"/>
      <path d="M947,98 L947,92 L941,92" class="corner-bracket"/>
      <path d="M533,462 L533,468 L539,468" class="corner-bracket"/>
      <path d="M947,462 L947,468 L941,468" class="corner-bracket"/>
    </g>

    <!-- Scan lines under card titles -->
    <g id="add-life-scan-lines">
      <line x1="68" y1="116" x2="140" y2="116" class="scan-line"/>
      <line x1="548" y1="116" x2="620" y2="116" class="scan-line"/>
    </g>

    <!-- Obstacle corner micro-brackets (tiny marks on each obstacle corner) -->
    <g id="add-life-obs-brackets">
      <!-- obs-1: x=220..330 y=160..228 -->
      <path d="M222,163 L222,161 L224,161" class="obs-bracket"/>
      <path d="M328,163 L328,161 L326,161" class="obs-bracket"/>
      <!-- obs-2: x=100..250 y=258..310 -->
      <path d="M102,261 L102,259 L104,259" class="obs-bracket"/>
      <path d="M248,261 L248,259 L246,259" class="obs-bracket"/>
      <!-- obs-3: x=300..430 y=260..336 -->
      <path d="M302,263 L302,261 L304,261" class="obs-bracket"/>
      <path d="M428,263 L428,261 L426,261" class="obs-bracket"/>
      <!-- obs-4: x=130..316 y=348..386 -->
      <path d="M132,351 L132,349 L134,349" class="obs-bracket"/>
      <path d="M314,351 L314,349 L312,349" class="obs-bracket"/>
    </g>

    <!-- Accent particles in whitespace -->
    <g id="add-life-particles">
      <circle cx="28" cy="70" r="1.4" class="particle-cool"/>
      <circle cx="972" cy="70" r="1.4" class="particle-cool"/>
      <circle cx="510" cy="70" r="1.2" class="particle-cool"/>
      <circle cx="510" cy="280" r="1.2" class="particle-cool"/>
      <circle cx="510" cy="460" r="1.0" class="particle-cool"/>
      <circle cx="570" cy="130" r="1.0" class="particle-warm"/>
      <circle cx="720" cy="200" r="1.4" class="particle-warm"/>
      <circle cx="890" cy="360" r="1.2" class="particle-warm"/>
      <circle cx="620" cy="420" r="1.0" class="particle-cool"/>
      <circle cx="30" cy="530" r="1.2" class="particle-cool"/>
      <circle cx="970" cy="530" r="1.2" class="particle-cool"/>
      <circle cx="500" cy="478" r="1.0" class="particle-warm"/>
    </g>
  </g>

  <!-- Title -->
  <text class="fg-1" x="500" y="32" text-anchor="middle" font-size="17" font-weight="700" filter="url(#glow-cyan)">container-scoped auto-routing</text>
  <text class="fg-3" x="500" y="52" text-anchor="middle" font-size="11">grid A* clips to a closed shape + turn-penalty produces clean multi-elbow paths</text>

  <!-- Cards (rounded) -->
  <rect class="card-A" id="card-A" x="50" y="90" width="440" height="380" rx="14"/>
  <text class="card-title" x="68" y="110" filter="url(#glow-label)">card-A</text>

  <rect class="card-B" id="card-B" x="530" y="90" width="420" height="380" rx="14"/>
  <text class="card-title" x="548" y="110" filter="url(#glow-label)">card-B</text>

  <!-- Endpoints inside card-A -->
  <rect class="src" id="src-A" x="90" y="140" width="84" height="44" rx="5"/>
  <text class="node-label" x="132" y="167">src</text>

  <rect class="dst" id="tgt-A" x="380" y="400" width="84" height="44" rx="5"/>
  <text class="node-label" x="422" y="427">tgt</text>

  <!-- Obstacles inside card-A -->
  <rect class="obs-1" id="obs-1" x="220" y="160" width="110" height="68" rx="3"/>
  <text class="obs-label" x="275" y="198">obstacle 1</text>

  <rect class="obs-2" id="obs-2" x="100" y="258" width="150" height="52" rx="3"/>
  <text class="obs-label" x="175" y="288">obstacle 2</text>

  <rect class="obs-3" id="obs-3" x="300" y="260" width="130" height="76" rx="3"/>
  <text class="obs-label" x="365" y="302">obstacle 3</text>

  <rect class="obs-4" id="obs-4" x="130" y="348" width="186" height="38" rx="3"/>
  <text class="obs-label" x="223" y="371">obstacle 4</text>

  <!-- dst inside card-B -->
  <rect class="dst" id="dst-B" x="760" y="244" width="110" height="56" rx="5"/>
  <text class="node-label" x="815" y="275">dst</text>

  <!-- Connector 1: A* multi-elbow auto-route inside card-A (cell_size=10)
       start_dir='E', end_dir='S', chamfer=5, standoff=4, stem_min=20;
       stem-zone turn penalty pushes the router's last corner far from
       tgt AND waypoint snap aligns A* cell centres with real endpoints
       so the threader doesn't insert extra corners that would eat the
       reserve. Final vertical leg now has room for standoff + head_len
       + a full 20 px visible stem AND a full 5 px chamfer at the last
       elbow -->
  <g id="route-c1" filter="url(#glow-route)">
    <path class="route-auto" d="M178.00,162.00 L200.00,162.00 L205.00,167.00 L205.00,240.00 L210.00,245.00 L440.00,245.00 L445.00,250.00 L445.00,350.00 L440.00,355.00 L427.00,355.00 L422.00,360.00 L422.00,386.00"/>
    <polygon class="route-auto-head" points="422.00,396.00 427.00,386.00 417.00,386.00"/>
  </g>

  <!-- Connector 2: card-A -> dst-B via true rect-rect geometry routing.
       Both endpoints are rects with start_dir='E' / end_dir='E'. Their
       natural midpoints (card-A: 280, dst-B: 272) differ by 8 px - under
       straight_tolerance=20 - so the slide heuristic collapses the L to
       a straight line. Bias-to-smaller-range picks dst-B's midpoint
       (272) as the shared y because dst-B is the smaller geometry
       (y-range 56 vs card-A's 380): dst-B does not move at all, and
       card-A absorbs the full 8 px slide on its much larger right edge
       where the displacement is visually invisible -->
  <g id="route-c2">
    <path class="route-edge" d="M494.00,272.00 L746.00,272.00"/>
    <polygon class="route-edge-head" points="756.00,272.00 746.00,267.00 746.00,277.00"/>
  </g>

  <!-- Annotations -->
  <text class="annot-bold" x="500" y="500" text-anchor="middle">C1: container_id = card-A + auto_route -> multi-elbow A* around four obstacles</text>
  <text class="annot" x="500" y="518" text-anchor="middle">C2: card-A -> dst via 1-bend auto-edge L (no container clip, plain geometric route)</text>

  <g id="add-life-icons">
    <!-- Lucide (ISC license) icons scaled 12x12, placed in card-title upper-right zones -->
    <!-- Card-A icon: box (container) upper-right at (460, 96), scale 0.5 => 12px glyph -->
    <g transform="translate(460, 96) scale(0.5)" class="card-icon">
      <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
      <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
      <line x1="12" y1="22.08" x2="12" y2="12"/>
    </g>
    <!-- Card-B icon: package (destination) upper-right at (920, 96), scale 0.5 -->
    <g transform="translate(920, 96) scale(0.5)" class="card-icon">
      <path d="M16.5 9.4l-9-5.19"/>
      <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
      <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
      <line x1="12" y1="22.08" x2="12" y2="12"/>
    </g>
    <!-- src icon: play (node upper-left corner at 94,144), scale 0.4 -->
    <g transform="translate(94, 144) scale(0.4)" class="node-icon-cool">
      <polygon points="5 3 19 12 5 21 5 3"/>
    </g>
    <!-- tgt icon: target (node upper-left at 384, 404), scale 0.4 -->
    <g transform="translate(384, 404) scale(0.4)" class="node-icon-warm">
      <circle cx="12" cy="12" r="10"/>
      <circle cx="12" cy="12" r="6"/>
      <circle cx="12" cy="12" r="2"/>
    </g>
    <!-- dst icon: flag (dst upper-left at 764, 248), scale 0.4 -->
    <g transform="translate(764, 248) scale(0.4)" class="node-icon-warm">
      <path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/>
      <line x1="4" y1="22" x2="4" y2="15"/>
    </g>
  </g>

</svg>
