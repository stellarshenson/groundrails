<!--
  07-theme-approval.svg - Theme swatch approval gate (hard dependency before delivery)
  Shows: swatch card (left) -> APPROVAL gate diamond (middle) -> fan of 4 deliverables locked behind gate (right)
  Intent: visualise that the theme swatch must be approved BEFORE any card grid, banner, flow diagram, or chart can be built
  Theme: Stellars-Tech (teal primary #0096d1, amber accent-2 #da8230)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 440">
  <style>
    .fg-1 { fill: #1a5a6e; }
    .fg-2 { fill: #24697e; }
    .fg-3 { fill: #236a74; }
    .fg-4 { fill: #2b7680; }
    .accent-1 { fill: #005f7a; }
    .accent-2 { fill: #7a4a15; }
    .on-fill { fill: #e0f2f7; }
    .stroke-accent-1 { stroke: #0096d1; }
    .stroke-accent-2 { stroke: #da8230; }
    .icon-stroke-1 { stroke: #005f7a; }
    .icon-stroke-2 { stroke: #7a4a15; }
    @media (prefers-color-scheme: dark) {
      .fg-1 { fill: #b8e4f0; }
      .fg-2 { fill: #8fd4e6; }
      .fg-3 { fill: #5aafc5; }
      .fg-4 { fill: #4099b3; }
      .accent-1 { fill: #5cc8e0; }
      .accent-2 { fill: #d4a04a; }
      .on-fill { fill: #e0f2f7; }
      .icon-stroke-1 { stroke: #5cc8e0; }
      .icon-stroke-2 { stroke: #d4a04a; }
    }
  </style>

  <!-- === GRID REFERENCE ===
    viewBox: 1100 x 440
    Margins: 20 all sides
    Title band: y=16..48 (title baseline y=32, subtitle y=46)
    Main flow band: y=60..400
    Footer band: y=410..432

    Three horizontal zones (h-stack):
      Zone A (swatch card):   x=40..300, w=260, h=240, y=90..330
      Zone B (gate diamond):  cx=490 cy=210 w=160 h=120 -> left=410, right=570, top=150, bottom=270
      Zone C (deliverables):  x=700..1080, w=380, four cards h=70 gap=10

    Swatch card internals (x relative to card.x=40):
      accent bar: y=90 h=5
      title    : y=112 x=56 fs=13 fg-1
      subtitle : y=128 x=56 fs=10 fg-3
      chip grid: 3 cols x 2 rows, cell 72x62, origin x=56 y=146
        col-x: 56, 130, 204
        row-y: 146, 218
        chip rect: 64x32 -> hex label y= chip_y + 32 + 11 = chip_y+43
      footer note: y=310 fs=8 fg-4 x=56

    Gate diamond (zone B):
      anchors: top(490,150) right(570,210) bottom(490,270) left(410,210)
      title 'APPROVAL': cx=490 y=206 fs=13 weight 700
      subtitle 'GATE':  cx=490 y=222 fs=10
      caption below : cx=490 y=296 fs=9 fg-4

    Deliverables zone (zone C, 4 rows):
      card-1 top=80  bottom=150 center=115
      card-2 top=160 bottom=230 center=195
      card-3 top=240 bottom=310 center=275
      card-4 top=320 bottom=390 center=355

    Connectors:
      swatch -> gate   : straight (302..408, y=210), arrowhead tip at 408
      gate -> fan      : MANIFOLD l-chamfer, spine (570,210)->(635,210), tension 0.9, align-elbows, chamfer 6
        fork -> card-1 : L-chamfer rail (635,209 -> 635,121 -> 641,115 -> 691,115), arrowhead tip at 699
        fork -> card-2 : L rail (635,209 -> 635,195 -> 691,195), arrowhead tip at 699
        fork -> card-3 : L-chamfer rail (635,211 -> 635,269 -> 641,275 -> 691,275), arrowhead tip at 699
        fork -> card-4 : L-chamfer rail (635,211 -> 635,349 -> 641,355 -> 691,355), arrowhead tip at 699

    LOCKED marker: padlock icon at (1004, 56), "LOCKED" label at (1030, 62), subtitle at (1070, 72) text-anchor end
  === -->

  <!-- === LAYOUT TOPOLOGY ===
    h-stack: [zone-A swatch-card, zone-B gate, zone-C deliverables-fan]
    v-stack inside zone-C: [card-1, card-2, card-3, card-4]
    h-align: swatch-card.right-center, gate.left, gate.right share axis y=210
    contain: swatch-card > [accent-bar, title, subtitle, chip-grid, footer-note]
    contain: gate-diamond > [title, subtitle]
    contain: each deliverable-card > [accent-bar, icon, title, subtitle, metadata]
    mirror: gate->card-1 / gate->card-4 and gate->card-2 / gate->card-3 symmetric across y=210
    flow: swatch -> gate -> 4 deliverables (fan-out)
  === -->

  <g id="background">
    <rect x="0" y="0" width="1100" height="440" fill="transparent"/>
    <g id="guide-grid" display="none">
      <line x1="0" y1="210" x2="1100" y2="210" stroke="red" stroke-width="0.3"/>
      <line x1="550" y1="0" x2="550" y2="440" stroke="red" stroke-width="0.3"/>
    </g>
  </g>

  <g id="nodes">
    <!-- Title band -->
    <g id="title-band">
      <text x="40" y="32" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" class="fg-1">Theme swatch approval gate</text>
      <text x="40" y="48" font-family="Segoe UI, Arial, sans-serif" font-size="10" class="fg-3">no approved swatch, no deliverables - a hard dependency at the top of the pipeline</text>
    </g>

    <!-- Zone A: swatch card -->
    <g id="swatch-card">
      <path d="M40,90 H300 V327 Q300,330 297,330 H43 Q40,330 40,327 Z" fill="#0096d1" fill-opacity="0.04"/>
      <path d="M40,90 H300 V327 Q300,330 297,330 H43 Q40,330 40,327 Z" fill="none" stroke="#0096d1" stroke-width="1"/>
      <rect x="40" y="90" width="260" height="5" fill="#0096d1" opacity="0.6"/>

      <!-- chip cells (inline fill ACCEPTED: these are palette demonstration chips - they must render exact hex) -->
      <!-- row 1: light mode swatches -->
      <rect x="56" y="146" width="64" height="32" rx="2" fill="#1a5a6e"/>
      <rect x="130" y="146" width="64" height="32" rx="2" fill="#005f7a"/>
      <rect x="204" y="146" width="64" height="32" rx="2" fill="#7a4a15"/>
      <!-- row 2: dark mode swatches -->
      <rect x="56" y="218" width="64" height="32" rx="2" fill="#b8e4f0"/>
      <rect x="130" y="218" width="64" height="32" rx="2" fill="#5cc8e0"/>
      <rect x="204" y="218" width="64" height="32" rx="2" fill="#d4a04a"/>
    </g>

    <!-- Zone B: gate diamond -->
    <g id="gate-diamond">
      <polygon points="490,150 570,210 490,270 410,210" fill="#da8230" fill-opacity="0.08"/>
      <polygon points="490,150 570,210 490,270 410,210" fill="none" stroke="#da8230" stroke-width="1.6"/>
    </g>

    <!-- Zone C: four deliverable cards -->
    <g id="deliverable-cards">
      <!-- card-1 -->
      <path d="M700,80 H1080 V147 Q1080,150 1077,150 H703 Q700,150 700,147 Z" fill="#0096d1" fill-opacity="0.04"/>
      <path d="M700,80 H1080 V147 Q1080,150 1077,150 H703 Q700,150 700,147 Z" fill="none" stroke="#0096d1" stroke-width="1"/>
      <rect x="700" y="80" width="380" height="5" fill="#0096d1" opacity="0.6"/>

      <!-- card-2 -->
      <path d="M700,160 H1080 V227 Q1080,230 1077,230 H703 Q700,230 700,227 Z" fill="#0096d1" fill-opacity="0.04"/>
      <path d="M700,160 H1080 V227 Q1080,230 1077,230 H703 Q700,230 700,227 Z" fill="none" stroke="#0096d1" stroke-width="1"/>
      <rect x="700" y="160" width="380" height="5" fill="#0096d1" opacity="0.6"/>

      <!-- card-3 -->
      <path d="M700,240 H1080 V307 Q1080,310 1077,310 H703 Q700,310 700,307 Z" fill="#0096d1" fill-opacity="0.04"/>
      <path d="M700,240 H1080 V307 Q1080,310 1077,310 H703 Q700,310 700,307 Z" fill="none" stroke="#0096d1" stroke-width="1"/>
      <rect x="700" y="240" width="380" height="5" fill="#0096d1" opacity="0.6"/>

      <!-- card-4 -->
      <path d="M700,320 H1080 V387 Q1080,390 1077,390 H703 Q700,390 700,387 Z" fill="#0096d1" fill-opacity="0.04"/>
      <path d="M700,320 H1080 V387 Q1080,390 1077,390 H703 Q700,390 700,387 Z" fill="none" stroke="#0096d1" stroke-width="1"/>
      <rect x="700" y="320" width="380" height="5" fill="#0096d1" opacity="0.6"/>
    </g>
  </g>

  <g id="connectors">
    <!-- Swatch -> gate: straight horizontal, stem (302,210)->(400,210), arrowhead tip (408,210) -->
    <!-- via: svg-infographics connector from=301,210 to=409,210 arrow=end head-size=8,6 color=#da8230 -->
    <path d="M302.00,210.00 L400.00,210.00" fill="none" stroke="#da8230" stroke-width="2.0" opacity="0.9" stroke-linejoin="round" stroke-linecap="round"/>
    <polygon points="408.00,210.00 400.00,204.00 400.00,216.00" fill="#da8230" opacity="0.9"/>

    <!-- Gate -> 4 deliverables: MANIFOLD l-chamfer fan-out with align-elbows -->
    <!-- via: svg-infographics connector mode=manifold starts=[(570,210)] ends=[(700,115),(700,195),(700,275),(700,355)]
              spine-start=(570,210) spine-end=(635,210) shape=l-chamfer chamfer=6 tension=0.9 align-elbows arrow=end head-size=8,4 -->
    <g class="manifold-connector" fill="none" stroke="#da8230" stroke-width="2.0" opacity="0.9" stroke-linejoin="round" stroke-linecap="round">
      <!-- spine: (570,210) -> (635,210) horizontal trunk -->
      <path d="M571.00,210.00 L634.00,210.00"/>
      <!-- fork -> card-1 (700,115): L-chamfer rail upward -->
      <path d="M635.00,209.00 L635.00,121.00 L641.00,115.00 L691.00,115.00"/>
      <polygon points="699.00,115.00 691.00,111.00 691.00,119.00" fill="#da8230" stroke="none" opacity="0.9"/>
      <!-- fork -> card-2 (700,195): L rail upward -->
      <path d="M635.00,209.00 L635.00,195.00 L691.00,195.00"/>
      <polygon points="699.00,195.00 691.00,191.00 691.00,199.00" fill="#da8230" stroke="none" opacity="0.9"/>
      <!-- fork -> card-3 (700,275): L-chamfer rail downward -->
      <path d="M635.00,211.00 L635.00,269.00 L641.00,275.00 L691.00,275.00"/>
      <polygon points="699.00,275.00 691.00,271.00 691.00,279.00" fill="#da8230" stroke="none" opacity="0.9"/>
      <!-- fork -> card-4 (700,355): L-chamfer rail downward -->
      <path d="M635.00,211.00 L635.00,349.00 L641.00,355.00 L691.00,355.00"/>
      <polygon points="699.00,355.00 691.00,351.00 691.00,359.00" fill="#da8230" stroke="none" opacity="0.9"/>
    </g>
  </g>

  <g id="content">
    <!-- Swatch card labels -->
    <g id="swatch-labels">
      <text x="56" y="112" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" class="fg-1">theme_swatch.svg</text>
      <text x="56" y="128" font-family="Segoe UI, Arial, sans-serif" font-size="9.5" class="fg-3">palette contract - the shared colour vocabulary</text>

      <!-- hex labels under each chip (row 1: light) -->
      <text x="88" y="189" font-family="Segoe UI, Arial, sans-serif" font-size="8" class="fg-4" text-anchor="middle">#1a5a6e</text>
      <text x="162" y="189" font-family="Segoe UI, Arial, sans-serif" font-size="8" class="fg-4" text-anchor="middle">#005f7a</text>
      <text x="236" y="189" font-family="Segoe UI, Arial, sans-serif" font-size="8" class="fg-4" text-anchor="middle">#7a4a15</text>
      <text x="88" y="200" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-4" text-anchor="middle">fg-1 light</text>
      <text x="162" y="200" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-4" text-anchor="middle">accent-1 light</text>
      <text x="236" y="200" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-4" text-anchor="middle">accent-2 light</text>

      <!-- hex labels under each chip (row 2: dark) -->
      <text x="88" y="261" font-family="Segoe UI, Arial, sans-serif" font-size="8" class="fg-4" text-anchor="middle">#b8e4f0</text>
      <text x="162" y="261" font-family="Segoe UI, Arial, sans-serif" font-size="8" class="fg-4" text-anchor="middle">#5cc8e0</text>
      <text x="236" y="261" font-family="Segoe UI, Arial, sans-serif" font-size="8" class="fg-4" text-anchor="middle">#d4a04a</text>
      <text x="88" y="272" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-4" text-anchor="middle">fg-1 dark</text>
      <text x="162" y="272" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-4" text-anchor="middle">accent-1 dark</text>
      <text x="236" y="272" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-4" text-anchor="middle">accent-2 dark</text>

      <text x="56" y="310" font-family="Segoe UI, Arial, sans-serif" font-size="8" class="fg-3">6 colours - 3 light, 3 dark - one approval signature</text>
    </g>

    <!-- Gate diamond labels -->
    <g id="gate-labels">
      <text x="490" y="206" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" class="accent-2" text-anchor="middle">APPROVAL</text>
      <text x="490" y="222" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="600" class="accent-2" text-anchor="middle">GATE</text>
      <text x="490" y="296" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-3" text-anchor="middle">user signs off before Phase 1</text>
    </g>

    <!-- Deliverable card labels + icons -->
    <g id="card-1-content">
      <!-- Icon: layout-grid (Lucide, ISC license) -->
      <g transform="translate(714, 96) scale(0.667)" fill="none" class="icon-stroke-1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect width="7" height="7" x="3" y="3" rx="1"/>
        <rect width="7" height="7" x="14" y="3" rx="1"/>
        <rect width="7" height="7" x="14" y="14" rx="1"/>
        <rect width="7" height="7" x="3" y="14" rx="1"/>
      </g>
      <text x="744" y="105" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" class="fg-1">Card grid</text>
      <text x="744" y="120" font-family="Segoe UI, Arial, sans-serif" font-size="9.5" class="fg-3">columns, rows, accent bars - all reference the swatch classes</text>
      <text x="744" y="134" font-family="Segoe UI, Arial, sans-serif" font-size="8.5" class="fg-4">fg-1 / fg-3 / accent-1 / accent-2</text>
    </g>

    <g id="card-2-content">
      <!-- Icon: image (Lucide, ISC license) -->
      <g transform="translate(714, 176) scale(0.667)" fill="none" class="icon-stroke-1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect width="18" height="18" x="3" y="3" rx="2" ry="2"/>
        <circle cx="9" cy="9" r="2"/>
        <path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/>
      </g>
      <text x="744" y="185" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" class="fg-1">Hero banner</text>
      <text x="744" y="200" font-family="Segoe UI, Arial, sans-serif" font-size="9.5" class="fg-3">title, subtitle, decorative imagery tinted via fg-1 + opacity</text>
      <text x="744" y="214" font-family="Segoe UI, Arial, sans-serif" font-size="8.5" class="fg-4">gradient bar from accent-1 to accent-2</text>
    </g>

    <g id="card-3-content">
      <!-- Icon: workflow (Lucide, ISC license) -->
      <g transform="translate(714, 256) scale(0.667)" fill="none" class="icon-stroke-1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect width="8" height="8" x="3" y="3" rx="2"/>
        <path d="M7 11v4a2 2 0 0 0 2 2h4"/>
        <rect width="8" height="8" x="13" y="13" rx="2"/>
      </g>
      <text x="744" y="265" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" class="fg-1">Flow diagram</text>
      <text x="744" y="280" font-family="Segoe UI, Arial, sans-serif" font-size="9.5" class="fg-3">cards wired with chamfered L-routes and fan connectors</text>
      <text x="744" y="294" font-family="Segoe UI, Arial, sans-serif" font-size="8.5" class="fg-4">arrow stroke = accent-1 or accent-2</text>
    </g>

    <g id="card-4-content">
      <!-- Icon: bar-chart-3 (Lucide, ISC license) -->
      <g transform="translate(714, 336) scale(0.667)" fill="none" class="icon-stroke-1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 3v18h18"/>
        <path d="M18 17V9"/>
        <path d="M13 17V5"/>
        <path d="M8 17v-3"/>
      </g>
      <text x="744" y="345" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" class="fg-1">Pygal chart</text>
      <text x="744" y="360" font-family="Segoe UI, Arial, sans-serif" font-size="9.5" class="fg-3">series colours injected from the approved palette at render time</text>
      <text x="744" y="374" font-family="Segoe UI, Arial, sans-serif" font-size="8.5" class="fg-4">dark-mode overrides flip series tints</text>
    </g>

    <!-- LOCKED marker above fan, top-right of zone C -->
    <!-- Icon bbox after transform: x=1004..1020, y=48..63. Text starts at x=1028 (8px clearance from icon right edge) -->
    <g id="locked-marker">
      <!-- Icon: lock (Lucide, ISC license) -->
      <g transform="translate(1004, 48) scale(0.667)" fill="none" class="icon-stroke-2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </g>
      <text x="1028" y="58" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="700" class="accent-2" letter-spacing="1">LOCKED</text>
      <text x="1028" y="70" font-family="Segoe UI, Arial, sans-serif" font-size="7.5" class="fg-4">blocked until gate passes</text>
    </g>

    <!-- Footer caption -->
    <text x="40" y="422" font-family="Segoe UI, Arial, sans-serif" font-size="8.5" class="fg-4">approve the swatch first - every card, banner, flow, and chart downstream inherits those exact hexes</text>
  </g>

  <g id="callouts">
  </g>

</svg>
