<!--
  16-algorithm-stack.svg - Scientific algorithm stack powering the plugin
  Shows: four horizontal layer cards stacked bottom-to-top, each representing an
         algorithm domain: Rasterisation (base), Pathfinding, Interpolation, Validation (top).
         Each card has a title, library tag, and 2-3 keyword items. Gradient opacity
         increases from bottom (0.04) to top (0.10) to show progression from low-level
         computation to high-level quality enforcement.
  Intent: reader sees the plugin is built on real scientific algorithms, not prompt heuristics.
         Bottom-to-top layering shows foundation -> application progression.
  Theme: Stellars-Tech. fg-1 titles, fg-3 labels, accent-1 layer cards with progressive
         opacity, accent-2 for library tags. Inter sans-serif throughout.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 380">
  <style>
    text { font-family: 'Inter', 'Segoe UI', Helvetica, Arial, sans-serif; }
    .fg-1 { fill: #1a5a6e; }
    .fg-3 { fill: #236a74; }
    .accent-1 { fill: #005f7a; }
    .accent-2 { fill: #7a4a15; }

    .layer-1-fill { fill: #005f7a; fill-opacity: 0.04; }
    .layer-2-fill { fill: #005f7a; fill-opacity: 0.06; }
    .layer-3-fill { fill: #005f7a; fill-opacity: 0.08; }
    .layer-4-fill { fill: #005f7a; fill-opacity: 0.10; }

    .layer-stroke { fill: none; stroke: #005f7a; stroke-width: 1; }
    .layer-bar    { fill: #005f7a; opacity: 0.6; }

    .lib-tag-fill   { fill: #7a4a15; fill-opacity: 0.12; }
    .lib-tag-stroke { fill: none; stroke: #7a4a15; stroke-width: 0.8; }
    .lib-tag-text   { fill: #7a4a15; font-size: 8px; font-weight: 600; font-family: 'Consolas', 'Menlo', monospace; }

    .layer-num  { font-size: 9px; font-weight: 700; letter-spacing: 1px; }
    .layer-title { font-size: 14px; font-weight: 700; }
    .layer-item  { font-size: 10px; }
    .layer-sep   { fill: none; stroke: #005f7a; stroke-width: 0.5; opacity: 0.2; }

    .up-arrow { fill: none; stroke: #236a74; stroke-width: 1.2; stroke-linecap: round; stroke-dasharray: 4 3; }
    .up-arrow-head { fill: #236a74; }

    @media (prefers-color-scheme: dark) {
      .fg-1 { fill: #b8e4f0; }
      .fg-3 { fill: #5aafc5; }
      .accent-1 { fill: #5cc8e0; }
      .accent-2 { fill: #d4a04a; }

      .layer-1-fill { fill: #5cc8e0; fill-opacity: 0.04; }
      .layer-2-fill { fill: #5cc8e0; fill-opacity: 0.06; }
      .layer-3-fill { fill: #5cc8e0; fill-opacity: 0.08; }
      .layer-4-fill { fill: #5cc8e0; fill-opacity: 0.10; }

      .layer-stroke { stroke: #5cc8e0; }
      .layer-bar    { fill: #5cc8e0; }

      .lib-tag-fill   { fill: #d4a04a; fill-opacity: 0.15; }
      .lib-tag-stroke { stroke: #d4a04a; }
      .lib-tag-text   { fill: #d4a04a; }

      .layer-sep { stroke: #5cc8e0; }
      .up-arrow  { stroke: #5aafc5; }
      .up-arrow-head { fill: #5aafc5; }
    }
  </style>

  <!-- === GRID REFERENCE ===
    viewBox: 1000 x 380
    Margins: left=40, right=40, top=0, bottom=10
    Title band: y=26 (17px 700 fg-1 centred), y=46 (11px fg-3 centred)
    Layer stack (bottom-to-top, 4 layers):
      Each layer card: x=40, w=920, h=64, rx=5
      Layer gap: 8px
      Total stack height: 4*64 + 3*8 = 280
      Stack starts at y=66 (topmost layer)
      Layer 4 (Validation, top):     x=40, y=66,  w=920, h=64
      Layer 3 (Interpolation):       x=40, y=138, w=920, h=64
      Layer 2 (Pathfinding):         x=40, y=210, w=920, h=64
      Layer 1 (Rasterisation, base): x=40, y=282, w=920, h=64
      Bottom of stack: y=346
    Card internals:
      Left accent bar: x=40, w=5, h=64 (vertical bar on left edge)
      Layer number: x=60, y=card_y+18 (9px 700 accent-1)
      Title: x=60, y=card_y+36 (14px 700 fg-1)
      Description items: x=60, y=card_y+52 (10px fg-3)
      Library tag: pill at x=880, y=card_y+26, w=auto, h=20, centred
    Up-arrow column (right side, between layers):
      x=30, from y=346 to y=66
      Dashed line with arrowhead at top
    Vertical rhythm: 64px layer + 8px gap = 72px stride
    Bottom annotation: y=368 (9px fg-3, centred)
  === -->

  <!-- === LAYOUT TOPOLOGY ===
    v-stack: title-band (0..58) | layer-4 | gap | layer-3 | gap | layer-2 | gap | layer-1 | bottom-pad
    h-align: all layers share x=40, w=920
    v-align: layers stacked with 8px gap
    contain: each layer -> accent-bar, number-label, title, items, lib-tag-pill
    flow: bottom-to-top progression shown by opacity gradient and up-arrow
  === -->

  <!-- Background -->
  <rect x="0" y="0" width="1000" height="380" fill="transparent"/>

  <!-- Title -->
  <text class="fg-1" x="500" y="26" text-anchor="middle" font-size="17" font-weight="700">algorithm stack</text>
  <text class="fg-3" x="500" y="46" text-anchor="middle" font-size="11">real algorithms, not prompt heuristics - foundation to enforcement</text>

  <!-- Up-arrow on left margin (bottom to top progression) -->
  <line class="up-arrow" x1="24" y1="350" x2="24" y2="78"/>
  <polygon class="up-arrow-head" points="20,82 24,70 28,82"/>
  <text class="fg-3" x="24" y="368" text-anchor="middle" font-size="8" font-style="italic">abstraction</text>

  <!-- ============================================================ -->
  <!-- LAYER 1 (base): Rasterisation - y=282 h=64                   -->
  <!-- ============================================================ -->
  <g id="layer-1">
    <rect class="layer-1-fill" x="40" y="282" width="920" height="64" rx="5"/>
    <rect class="layer-stroke" x="40" y="282" width="920" height="64" rx="5"/>
    <rect class="layer-bar" x="40" y="282" width="5" height="64" rx="5"/>
    <text class="accent-1 layer-num" x="60" y="300">LAYER 1</text>
    <text class="fg-1 layer-title" x="60" y="318">Rasterisation</text>
    <text class="fg-3 layer-item" x="60" y="336">distance transforms, obstacle masks, connected-component labelling</text>
    <!-- Library tag -->
    <rect class="lib-tag-fill" x="840" y="296" width="100" height="20" rx="10"/>
    <rect class="lib-tag-stroke" x="840" y="296" width="100" height="20" rx="10"/>
    <text class="lib-tag-text" x="890" y="310" text-anchor="middle">scipy.ndimage</text>
  </g>

  <!-- ============================================================ -->
  <!-- LAYER 2: Pathfinding - y=210 h=64                             -->
  <!-- ============================================================ -->
  <g id="layer-2">
    <rect class="layer-2-fill" x="40" y="210" width="920" height="64" rx="5"/>
    <rect class="layer-stroke" x="40" y="210" width="920" height="64" rx="5"/>
    <rect class="layer-bar" x="40" y="210" width="5" height="64" rx="5"/>
    <text class="accent-1 layer-num" x="60" y="228">LAYER 2</text>
    <text class="fg-1 layer-title" x="60" y="246">Pathfinding</text>
    <text class="fg-3 layer-item" x="60" y="264">A* with turn penalty, stem-zone cost, Manhattan heuristic</text>
    <!-- Library tag -->
    <rect class="lib-tag-fill" x="866" y="224" width="74" height="20" rx="10"/>
    <rect class="lib-tag-stroke" x="866" y="224" width="74" height="20" rx="10"/>
    <text class="lib-tag-text" x="903" y="238" text-anchor="middle">heapq</text>
  </g>

  <!-- ============================================================ -->
  <!-- LAYER 3: Interpolation - y=138 h=64                           -->
  <!-- ============================================================ -->
  <g id="layer-3">
    <rect class="layer-3-fill" x="40" y="138" width="920" height="64" rx="5"/>
    <rect class="layer-stroke" x="40" y="138" width="920" height="64" rx="5"/>
    <rect class="layer-bar" x="40" y="138" width="5" height="64" rx="5"/>
    <text class="accent-1 layer-num" x="60" y="156">LAYER 3</text>
    <text class="fg-1 layer-title" x="60" y="174">Interpolation</text>
    <text class="fg-3 layer-item" x="60" y="192">PCHIP monotonic splines, Bezier tangent computation</text>
    <!-- Library tag -->
    <rect class="lib-tag-fill" x="835" y="152" width="105" height="20" rx="10"/>
    <rect class="lib-tag-stroke" x="835" y="152" width="105" height="20" rx="10"/>
    <text class="lib-tag-text" x="887" y="166" text-anchor="middle">scipy.interpolate</text>
  </g>

  <!-- ============================================================ -->
  <!-- LAYER 4 (top): Validation - y=66 h=64                        -->
  <!-- ============================================================ -->
  <g id="layer-4">
    <rect class="layer-4-fill" x="40" y="66" width="920" height="64" rx="5"/>
    <rect class="layer-stroke" x="40" y="66" width="920" height="64" rx="5"/>
    <rect class="layer-bar" x="40" y="66" width="5" height="64" rx="5"/>
    <text class="accent-1 layer-num" x="60" y="84">LAYER 4</text>
    <text class="fg-1 layer-title" x="60" y="102">Validation</text>
    <text class="fg-3 layer-item" x="60" y="120">WCAG contrast ratios, Shapely collision detection, greedy constraint solver</text>
    <!-- Library tag -->
    <rect class="lib-tag-fill" x="843" y="80" width="97" height="20" rx="10"/>
    <rect class="lib-tag-stroke" x="843" y="80" width="97" height="20" rx="10"/>
    <text class="lib-tag-text" x="891" y="94" text-anchor="middle">shapely + W3C</text>
  </g>

</svg>
